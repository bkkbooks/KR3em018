front:
  text: 序歙縣西園鄭氏以喉牙科名歷世相傳實擅起死回生之能術而通乎神者矣顧甚居奇守秘聲價自高殊不知其所以炫世驚人攫盛名賺金錢者全藉重樓玉鑰一書而已也書分正續兩編正編早已盛行於世習是科者罔不奉為圭皋盡皆謂為完壁足以應用而有餘而弗料其更有玄妙之續編在也觀樞扶氏之自序言是書之珍秘得書之艱難至有不再他傳之哲固屬從前人務獨善不知道德之陋習蓋其靈驗可貴之價值實有倍於尋常之喉牙諸書者焉正編言為僕人竊出展轉傳鈔致坊間亦得刊售續編之什襲珍藏當更較格外慎重矣余家所藏之冊系用桃花紙鈔訂者字跡惡劣而潦草裝訂粗率而顛錯一見可知為乘機偷暇之所成折開印寫之情形猶宛在也原書經樞扶先生一再增輯特於喉症白腐專論加詳近今坊本陳修園醫書中及以外有數種專言此症者殊皆不及此書之縝密妥當也此冊首頁有道光元年辛己歲大呂月歙南昌溪吳季儒鈔十八字計其年月距嘉慶九年樞扶先生自序時才十有七年正鄭氏鼎盛期間萬無沽售流行之理必屬至親密友偵知藏處如如姬盜兵符遵王賺竹垞之故事以智誘計取而得之者無疑也同治初年兵燹方定我邑蓮川周丈邦彥以數十青蛈得此於裨販擔頭庋置架間一未寓目以己習內科此屬非其所學也先君子萃庵公見而喜之假以歸涉閱一周謂之曰此鄭氏秘笈也喉牙口舌得此可以名家矣周丈頓悟急即索回越數歲家計益窘又值其子將續絃乃以此冊作贈而告借銀幣念番先君子慨然允之書遂為我家有矣先君子豁達多能望隆鄉邑排紛解難應給不暇醫藥堪輿雖皆素嗜而迫於環境不克精專致此書亦從耽滯歷廿餘年也末一試用也斯時先五兄石農挈眷居仁里岳家從其外舅程金門先生兼習儒與醫學光緒甲午菊秋嫂氏徒嬰喉患先即翁婿合治繼延歙東舍頭專科程炳文暨績城名醫葛巨川章儀廷仲貽諸先生診視濟濟一堂愈治愈劇奄然一息臥莫能興石農乃函致家中筱濤大侄備述病危商量後事尚欲秘弗與先祖母朱太宜人知恐其年高鍾愛有素致傷起居也筱濤稟諸先居子倏爾憶及是書急命檢出專人星夜齎去相距四十里以酉正發亥末至矣方憂其經多延誤不及挽救復慮其治法少驗徒勞無功舉室旁皇擾攘達旦錯午使者回言至即照書配藥煎服頭劑得效如神晨間再進一劑己刻已起坐索粥病去大半我動身時諄諄乞告堂上勿再記念某已霍然就廖矣蓋其所採用只養陰清燥湯神功丹二方而已於是乃共寶此書翁婿於數日中倩人各鈔二冊以備轉借之有失也嗣後患此者較多而愈可速里中有患者亦輒就先君子求診皆隨治而療焉戊戌仲春先君子捐館舍石農回里行道汽後歷遊宣城受聘豫章俱以善治喉名緣以此為師承也餘步石農之後懸壺七載喉牙疾患療愈百數實亦得此書之資益者也親友中習醫及好義者皆就索鈔無不如願以償之然余拙不自藏夙懷普濟思鈔傳之有限欲付梓而
