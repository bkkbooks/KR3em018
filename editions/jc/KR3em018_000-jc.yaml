body:
  text: 跋丁巳之秋九月念六餘妾洪氏忽然喉症乍起白大若錢寒熱交作手足如冰次早延醫服牛蒡甘桔而未解也再服病益進別延友人紫正地黃湯又延友人羌活大黃湯月至朔而命殂矣或曰此惡症也古無治法或曰此真證也百不一生予悲之天之酷人太甚也詰朝樞扶叔祖慰我予具以告叔祖曰燥也死於命非死於病也子悲何補哉夫醫者理也風勝濕火就燥燥虛火而非實火也子喻五行者也反生反克知乎無水不生非土不養水燥則涸而木死木燥則枯而火死火燥則烈而土死土燥則崩而金死金燥則頑而水死生機熄矣其見症也不亦宜乎經曰燥以潤之不有潤也不死何待時志之不敢忘越數日小女未周歲而症作即延治七日而滿口之白腐頓消成敗易勢得失相反始信斯症之不惡也治有治法也證無真假也一生百生也我叔祖之言不爽也今壬戌仲冬集稿成篋授予讀之竟其委清其源不覺言之娓娓道之津津此非一朝一夕之故其所由來漸矣其論確其見真其功深其心苦其論確故要言不煩其見真故取效甚速其功深其心苦則叔祖之篤信好學也世之咄咄以為惡症者不且共登衽席而享壽域乎哉當時同證三人二俱不可死者竟六七日而偕亡惟小女未周歲而獨存籲不遇樞扶叔祖命也居今思昔為之盡然爰跋於後後深感一線之生云爾時嘉慶七年歲在壬戌孟冬月上浣雙橋蓮湖居士謹識白纏喉敘鄭子若溪聰明好學士也潛心於醫學有年矣其於喉證尤究心焉蓋喉科乃其家傳然其書特言實症而虛症未之及也至於白腐一證近日更多醫者罔察自作聰明不論色脈每作實證治之而夭枉者不可勝數若溪心竊傷之自出手眼因辯證著方以闢其謬而病是證者咸登壽域書成持以示予予讀之不覺躍然因謂之曰善哉子能為白腐證闢一坦道而以虛燥立方子之功德遠矣蓋白者肺色也腐者腎臭也原非病也形而出之外則病矣白加腐則肺燥矣腐且白則腎枯矣既燥且枯子母俱敗不有以潤之補之而猶曰紫正敗毒則將持雌失雄棄陰負陽其不至於載胥及溺不止矣吾子之論是也藏之名山曷若傳之後世好生之德與人同之不亦善乎因書之以弁其簡端七十有六老人莘田吳守先紹中氏拜撰自敘先高祖赤山公瀚七代祖也性好堪輿精研軒岐淵源已久是故知醫代不乏人然未嘗輕言也先大父認齊公當賈旴豐時會閩人黃明生先生異授喉科治驗如神活人甚多心竊慕焉因思利濟於人是科為最計與商之而先生不可其時叔祖仰山公向認齊公曰窺先生之秘非禮莫能為也於是具幣帛束金百兩負笈於先生之門先生曰予非吝而不傳實有因耳昔授受時曾立不傳之誓違之則主乏嗣既誡於前何可背於後耶仰山公曰今懇先生之秘者實存濟人之念耳如能廣以濟人即先生自濟也先生何樂而不為焉請熟籌之如是俯可出其書以授乃囑曰珍之仰山公曰唯唯認齊公旋里命父伯輩咸究心焉凡患喉疾實症者依法療之無不神效而先生年近六旬果無嗣而歿仰山公攜遺像一幀而歸供奉於書室中由是數十年來活人甚廣後被僕人私竊其半貪利而售之於外遂至更相傳鈔家有其本邇來業是科者皆執此書為圭臬焉瀚雖不敏未冠時性近醫及地理從績北曹素峰先生遊至於醫學過庭之訓精醫諸友聆益良多於是遍歷楚豫江浙會稽蘇揚間獲異人奇方往往輒效又遇馬子從龍於吳山之大乘古剎馬氏曰不遊名山大川不登山陰禹穴烏足以言地理而醫亦然子知之乎須襟懷淡蕩領會山川靈秀於胸次便覺悠然而不侷促融通而無固執矣信乎方子岫云云予於痘疹之機括每從漢印中悟出斯言也誠得此中三昧語耳非好奇之謂也蓋痘者豆也非毒也當其未感發之時無形可據夫何毒之有既發動透於肌膚雖形現於外尚未成漿猶未可執以為毒也或成漿時方可以毒論然毒即氣血也痘之起長貫漿收靨落痂全憑乎氣血陰陽凡血充氣足則陰陽調暢能化毒載出營衛故應期而痊若血虛氣虧陰陽偏勝焉能斂毒達於肌肉況習俗從事於寒涼伐及無辜而氣血復為所傷毒隨氣血散漫以致內陷變為敗症莫可挽救是誰之責歟皆因執毒之義為害也是以流毒日深牢不可破寧服寒涼而斃終無怨也至於喉科以及諸症總不離乎氣血陰陽表裡虛實耳余於壬子歲自漢歸來抱終天之恨無以為計與三弟朝夕研醫互相討論以承家學忽忽間倏一紀不覺光陰之迅也因念年逾半百精力漸衰地理一道跋涉維艱而流水高山嘆鍾期之難遇故將喉科歷年來辯明虛實寒熱之處一一詳言之俾後之習此者知有所導庶不致膠柱刻舟之誚以補是科之所未及云爾時大清嘉慶九年歲在甲子孟夏月上浣雙橋樞扶氏鄭瀚書於十琴軒之西窗續重樓玉鑰自敘喉科之書所見凡十有餘家或詳或略各有所長至若治驗神速莫如秘授三十六症自治療以來活人甚廣然未嘗論證與脈要之總是死法未為盡善也余懼醫家各執秘授不知通變往往反因而誤事故與環川方子岫云博採古今之書纂為續編以補諸家之未備其中指示色脈辯別症因以至用藥加減之法至詳極慎醫者誠能遵而用之神而明之庶不致膠柱刻舟之誚其於仁術或未必無小補云雙橋樞扶氏若溪鄭瀚識統理十二經脈皆上循咽喉咽主地氣地氣通於嗌足太陰脈布胃中絡於嗌故病則脘滿而嗌乾邪客於足少陰之經令人嗌痛不可內食無故善怒氣上走賁肝者中之將也取決於膽咽為之使一陰一陽代絕此陰氣至心上下無常出入不知咽喉乾燥病在脾土手太陽之經循咽嗌手少陽之脈循頸結缺盆令咽腫素問足太陰之正上結於咽足少陰所生病口熱舌乾咽腫上氣嗌乾及痛陰陽之脈上通於心循咽出於口足少陽之正上挾咽出頤頷靈樞挾咽屬手少陰心足太陰脾經之會準繩吸主天氣天氣通於肺謂之肺系頸側挾咽之動脈人迎人迎者足陽明胃也陽明者常動素問手太陰之正出缺盆循喉嚨手少陰之正上走喉嚨出於面手陽明之正上循喉嚨出缺盈靈樞喉嚨者脾胃之候也千金喉嚨後屬厥陰心包經人迎後屬手陽明大腸經準繩十二經中惟足太陽膀胱之脈上額交巔絡腦下項循肩膊挾脊抵腰結於缺盆不循咽喉然下項結缺盆則亦不離咽喉左右矣岫云咽喉者水穀之道也喉嚨者氣之所以上下者也厭者聲音之戶也懸雍者聲音之關也內經咽與喉會厭與舌此四者同在一門而其用各異喉以納氣故喉氣通於天咽以納食故嚥氣通於地會厭管乎其上以司開闔掩其厭則食下不掩其喉必錯以舌抵上顎則會厭能閉其喉四者交相為用缺一則飲食廢而死矣子和咽在喉之前所以咽物喉在咽之後所以候氣謂咽在喉後者楊上善之誤也準繩總論喉痹大意一陰一陽結謂之喉痹王冰注曰一陰肝與心包也一陽膽與三焦也四經者有相火併絡於咽喉氣熱內結結甚則腫脹脹甚則痹痹甚則不通而痰塞以死矣心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹邪客於少陰之絡令人喉痹舌卷口乾心煩手陽明少陽厥逆發喉痹嗌腫痓內經喉痹不能言取足陽明能言取手陽明靈樞十二經脈皆上循咽喉盡得以病之然統其所屬乃在君相二火而已蓋肺主氣天也脾主食地也納氣者從金化納食者從土化金性燥土性濕乃至於病也金化變動為燥燥則澀澀則閉塞而不仁土化變動為濕濕則泥泥則壅脹而不通故在喉曰痹在咽曰腫雖有纏喉乳蛾嗌塞喉干種種之不同其為火鬱上焦致痰涎氣血結聚於咽喉一也治法當視火之微甚微則正治甚則反治撩痰出血隨宜而施準繩十二經言嗌乾嗌痛咽腫頷腫舌本強皆君火為之也惟喉痹急速相火之所為也君火猶人火也相火猶龍火也人火焚木其勢緩龍火焚木其勢速內經之言喉痹則咽與舌亦在其間以其病同是火故不分也治喉痹之火與救火同不容少待內經火鬱發之發謂發汗然咽喉豈能發汗故出血者乃發汗之一端也喻氏論喉痹關乎運氣而有火濕寒之異素問曰運氣少陽所至為喉痹耳鳴嘔湧又曰少陽司天之政三之氣炎暑至民病喉痹此乃屬火者也宜仲景桔梗湯或面赤斑者屬陽毒宜陽毒諸方汗之又曰太陰之勝火氣內郁喉痹又云太陰在泉濕淫所勝病嗌腫喉痹此屬濕者也宜活人半夏桂枝甘草湯又云太陽在泉寒淫所勝民病咽痛頷腫此屬寒者也輕者表散重者理中四逆酌用或面青黑者屬陰毒宜陰毒諸方汗之按運氣雖有火濕寒之不同然濕則熱生乎中寒則火鬱於內同歸於火故治法大要以發之為主如針刺刀砭藥則赤麟散金碧二丹皆是大苦大寒辛熱之劑間亦有時需用斷不可輕易浪投慎之岫云內因因胸膈素有痰涎或縱酒過度或忿怒失常或房事不節火動其痰湧塞於咽喉之間以致內外腫痛水漿不入醫鑑有屬運氣天行者有因七情鬱結者有寒客會厭者有寒傷腎而帝中腫者外候外候最多已載前編茲不復贅岫云其毒聚於內涎唾稠黏但發寒熱者塞喉風也暴發暴死者名走馬喉風子和走馬喉風卒然失音不省人事痰壅口噤閉塞而死與諸卒中相似必先有喉痛為辨耳李惺庵論喉與咽之異喉痹者謂喉中呼吸不通言語不出乃天氣閉塞也咽痛謂咽嗌不能納唾飲食不入乃地氣閉塞也類要病喉痹者必兼咽痛咽嗌痛者不必盡兼喉痹王宇泰論表與里之分屬表者必兼惡寒且寸脈弱小於關尺此寒閉於外熱鬱內宜辛涼發散切忌酸寒屬裡者身無熱而寸脈滑石於關尺乃積熱於內壅滯生痰宜苦寒折伏及湧吐之法李惺庵亦有表證輕而無寒熱者宜細辨之岫云惡寒而寸脈小鄉里所患相同此屬天行時氣宜先表散大忌酸寒吹點苦寒下之景嵩崖辨虛與實之異實火因過失煎炒炙煿醇酒熱毒蘊積胸膈不利煩渴便閉虛火因七情勞欲氣虛虛火上炎咽膈乾燥二便如常入門辨陰陽之分陽虛者兩寸浮大遇勞益甚此肺脾氣怯不能堤防下焦須培補中宮陰虛者兩尺洪數日晡轉甚此肝腎陰虛不能制御龍雷必滋養癸水脈法兩寸浮洪而溢者喉痹也兩尺細微無力者虛炎也若微甚而伏者死浮大而澀者亦死沉細者不治洪大有力者易治弦數有力為實火左寸虛數尺微為虛火宜滋養金水兩脈若浮大重取而澀者此陰氣大虛陽氣浮越也宜補陰斂陽人參一味濃煎湯飲之用喉科法治之必死治法喉症不一不可概以實熱為治大率熱則通之寒則補之不寒不熱依經調之湯劑盪滌而外復有針刺等法要皆急治時不可緩非若臟腑積久之病磨化調養之可比聖濟錄治實之法輕者先宜發散次用清涼重者先湧導痰涎針砭出血再用煎劑治虛之法須遵內經從治之旨徐徐與之正傳凡喉症過四五日為重三日前可消若非是急證一二日不發寒熱第三日始發寒熱若頭痛則兼傷於寒須疏風散寒問二便如何便利者乃浮游之火上攻宜消風祛熱降氣解毒之劑婦人喉痛必先問其經水通閉若經閉者用通經藥愈矣喉疼連胸紅腫而痛右寸浮洪而數甚系肺癰須用蜜調藥加百草霜桔梗為妥凡喉中無形而紅腫者宜多用燈心灰喉碎者先吹長肉藥後用碧丹痰不出用金丹加制皂角少許倘至穿爛多用口疳藥加龍骨珍珠喉症無痰不治有痰聲如解鋸者危用金丹吹之初發寒戰後即身涼口不碎無重舌二便利即非熱症蓋虛寒亦能發痰此痰不可去盡乃身內精液與乳蛾舌䪞舌之痰吐盡而腫消者不同當先用吹藥喉一通即服煎藥第一劑發散和解第二劑即溫補導火納氣設三四日後再發寒戰或見心肋痛等症者難治發時牙關緊喉舌腫口碎腥臭重舌或舌胎黃而有刺便閉者此是熱症赤麟散角藥紫地湯金丹碧丹開風路針皆神效若依法治之症不減牙關反閉唇不腫紋如無病人者不治尊生書論忌用寒涼針砭之證專用芩連梔柏之類正治之則上熱未除中寒復起毒氣乘虛入腹變為敗症正傳虛火上炎者純用寒涼必致上喘下瀉亦最忌發汗針砭出血內傷虛損咽痛失音者誤針之必不救嵩崖寒傷腎而致帝中腫者此證人皆不知宜以八味丸加減切禁用針帝中號喉花關乎性命其慎之岫云死症胸前高起上喘下泄手足指甲青紫七日以後全不入食口如魚口者死又急喉痹症聲如鼾睡此為肺絕必死用人參竹瀝薑汁或可救其萬一丹溪舌腫滿口色如胡桃茄子硃砂紙不治口渴氣喘痰如桃膠一頸皆腫面帶紅紫或青或純白無神皆不治喉風過一日夜牙噤喉響如雷燈火近口即滅此氣已離根有升無降不治喘急額汗者不治景日胗用藥加減法主以甘桔湯加薄荷荊芥防風黃芩玄參牛蒡子竹茹等咳嗽加貝母陳皮渴加花粉麥冬唾血加紫菀嘔惡加半夏胸滿加枳殼便閉加大黃痰甚加石膏火甚加川黃連卒閉暴死用解毒雄黃丸此皆治實火之法也凡屬虛者當從權為主古人有用肉桂人參附子炮姜者但理其下而上自安此乃求本之治也大抵血虛用四物湯氣虛用補中益氣湯肝火用逍遙散腎虛用地黃湯佐以治標之品又有命門火衰龍浮咽嗌痛者唯八味丸最效而寒涼之劑則一毫不可浪用也匯補咽痛必用荊芥陰虛火炎必用玄參氣虛加人參竹瀝血虛四物加竹瀝丹溪凡喉症最忌半夏生薑最喜梨汁柿子嵩崖一切咽喉痛紫雪為要藥程云來紫雪純寒重症不可用或合赤麟散用之始佳岫云統論脾胃皆交於口而脾為之主中央黃色入通於脾開竅於口藏精於脾足陽明胃之脈俠口下交承漿素問俠口屬衝任二脈靈樞口屬脾胃大腸脈交口然畢竟脾經為主蓋五味入口藏於胃脾乃運化精液以營養五臟五臟之氣皆統於脾五臟偏盛皆驗於口胃經氣血少則兩吻多紋書嵩崖內因味入於口藏精脾胃運化精液以養五臟若五味過偏則五臟之氣亦偏而諸病生焉大全凡人晨起及食後不漱口每多口齒腐臭及生瘡菌等患外候肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸胃熱則口淡正傳此臟氣偏勝為病也亦有謀慮不決肝移熱於膽而口苦者有脾胃氣弱木乘土位而口酸者有膀胱移熱於小腸膈腸不便上為口糜而生瘡潰爛者內經有熱積心胸之間脾氣凝滯不能運化濁氣熏蒸而口臭者此臟氣移熱而為病也匯補論口瘡赤白之異及午前午後痛者微甚之分口瘡雖由脾熱所使然當分赤白二種白者肺熱赤者心熱赤白相兼者心肺俱熱不獨脾家病也李惺庵實熱者色多赤虛熱者色多白午前痛甚者實火也午後痛甚者虛火也亦有陰虛火炎發為口糜滿咽如白飯者未可概目為肺熱也岫云脈法脈浮數為實火浮大為虛火匯補浮數有力按之不減為實浮大而數按之弱澀為虛須細辨之為要治法五臟之氣皆統於脾凡七情六慾五味皆能致病當因病而求之繩墨若服涼劑不愈者此中焦元氣不足虛火炎上也又宜溫補李惺庵用藥加減法肺熱口辛桔梗山梔炒芩桑白皮天冬麥冬沙參膽熱口苦柴胡草龍膽棗仁茯神生地生甘草心熱口苦黃連生地麥冬丹皮肝熱口酸逍遙散脾虛木乘土位而口酸者四君子加白芍柴胡脾熱口甘白芍天花粉山梔陳皮蘭草胃熱口淡青黛石斛石膏竹葉胃火口臭竹葉石膏湯口燥二冬五味白芍生甘草人參腎熱口咸六味加玄參知母口糜實熱加味逍遙虛熱補中益氣嵩崖膀胱移熱口爛溺澀導赤散中上虛寒胃陽浮上者理中湯下焦火炎者八味丸匯補統論唇為脾胃肝之所主脾者食廩之本營之居也其華在唇素問上唇挾口屬手陽明大腸下唇挾口屬足陽明胃靈樞唇肝脾胃三經所主驗臟腑之寒熱最便不可不知肝脈督脈衝脈任脈皆絡者也元珠內因脾胃受邪唇為之病大全唇舌者肌肉之本也肌氣絕則脈不榮肌肉故肌肉軟而舌萎人中滿唇反唇反者肉先死也脾病者唇黃脾絕者唇四面腫靈樞外候唇之為病風勝則動寒勝則縮燥勝則乾熱勝則裂氣鬱則生瘡血少則無色脾冷則紫脾敗則黑脾寒則青脾虛則白脾衰則黃脾實則紅繩墨心熱則上下唇皆赤若上唇赤下唇白者腎虛而心火不降也元珠肺主唇色白白而澤者吉白如枯骨者死人唇白當補脾肺若深紅色則當散肺家虛熱錢仲陽用藥加減法脾燥唇乾用生地麥冬山藥歸芍人參蜂蜜脾熱唇裂涼膈散唇動消風散唇青唇縮或唇揭理中湯唇腫薏苡仁湯唇瘡既久血虛火炎者當滋補勿任苦寒李惺庵統論舌為心脾所主心在竅為舌素問心脈系舌本腎液出舌端脾脈系舌旁肝脈絡舌本雖分有五臟而心脾實主之故二臟不和變生諸症玉策膀胱經結舌本三焦經系舌本日胗內因心和則舌能知五味聲音嘹亮內經心絕則舌不能收及不能語喬垂脾主舌強腎主舌乾岫云誤食毒味及冬月向火取暖過度俱使舌變生病患外候中風痰則舌卷難言傷七情則舌腫難食三焦蘊熱則舌胎燥而咽乾心脾熱熾則舌粗重而口苦繩墨氣虛則麻縱陰火則點黑濕痰則腫脹鬱熱則衄血心火則生瘡脾熱則乾澀胃熱則木強肝熱則卷且縮肺熱則舌燥而咽門聲啞腎熱則津竭而舌心乾焦匯補治法舌症有十五種用藥不禁寒涼然必帶辛散乃效日胗舌屬火其性炎上治舌當降火滋陰繩墨凡治口舌輕症以鹽滾水為最便且亦妥善勿謂以其易而少效也用藥加減法風痰用二陳加南星竹瀝郁痰加香附青皮三焦鬱熱涼膈散心脾鬱熱三黃丸思慮傷脾血耗火動歸脾湯鬱怒傷肝血虛火旺逍遙散腎虛陰火滋腎丸李惺庵論齒為腎胃大腸所屬齒者骨之餘髓之所養故齒屬腎上齦屬胃下齦屬太陽凡動搖豁脫或大痛或不痛或出血或不出血如欲脫之狀皆屬腎病其雖疳齦腫潰爛臭穢而不動者皆屬陽明或兼諸經錯雜之邪醫貫若陽明膏粱之變濕熱上攻則牙床不清而為腫為痛或出血生蟲而黑爛脫落玉綸若腎虛作痛者遇勞即發午後更甚口渴面黑倦怠遺精此皆脾胃虛之證醫貫外候精完則齒堅腎衰則齒豁虛熱則齒動髓溢則齒長入門腎虛牙痛其齒浮血虛牙痛其齒癢火熱牙痛其齒燥蟲蝕牙痛其齒黑風熱牙痛其齒腫濕熱牙痛其齒木繩墨又有風熱相搏吸風即痛者有寒氣犯腦頭項連齒痛者有痰氣熱氣毒氣注痛咳嗽者有血搏齒間鑽刺掣痛者正傳濕熱蘊積日久則發為走馬牙疳司命齒痛有惡寒惡熱之不同手陽明惡寒而喜熱飲足陽明惡熱而喜冷飲故齒痛有惡寒熱之不同正傳惡寒飲者外吸風寒所致惡熱飲者內生風熱使然匯補脈法尺脈虛大者腎虛洪數者陰火關脈浮弦者風熱洪滑者痰火也治法齒根宣露動搖者腎元虛也治宜補腎惡寒熱而口臭者陽明熱也治宜清胃醫衡齒蝕宜清腸胃以治其本擦牙誅蟲以絕其標李惺庵走馬牙疳急宜瀉胃清火敷牙疳之藥日胗牙疳亦有急宜大劑滋陰溫補者岫云用藥加減法陽明病清胃散加乾葛石膏芩連花粉山梔如胃火盛倍石膏大腸實加大黃挾痰加貝母挾風加防風酒毒倍乾葛蟲蝕加檳榔齦癢加白芷齦爛加龍膽草若勞倦而胃虛齒浮用補中益氣湯腎虛用地黃湯加玄參補骨脂陽虛豁落加續斷枸杞茴香陰虛浮動加知柏生地丹皮匯補諸證補遺走馬喉痹走馬喉痹勢如奔馬喉間痹痛腫連頰骨壯熱煩悶數數吐氣者是也此肺脾不利熱毒攻衝發於咽喉所致急開風路針吹赤麟散噙角藥服紫地湯或解毒雄黃丸緩則不及凡喉科痹閉急證一時覓藥不及急用土牛膝根搗汁滴入亦可挽救於萬一屍咽喉道家服藥務先去三蟲以其為人害也屍咽之病亦本於此巢氏謂腹中屍蟲上蝕咽喉能令生瘡或癢或痛如䘌候是也善攝生者倘未能除去亦當服藥治之勿使妄動則善矣黃柏湯主之或一捻金吹之纏喉風再見喉腫而大連頂腫痛喉內紅絲纏緊勢如絞轉且麻且癢手指甲青手心壯熱痰氣盛湧如鋸手足厥冷或兩頤及項赤色纏繞發寒熱者亦是先兩日必胸膈閉滯痰塞氣促最為急症內服喉痹飲外用金碧二丹吹之若加牛黃效更速捷岫雲山人曰此症開風路針吹赤麟散服紫地湯更神效此水涸火炎肺金受克也難治忌辛熱收澀用養金湯生地阿膠杏仁知母丹參麥冬桑白皮蜂蜜喉中醒臭此屬肺胃熱毒黃芩射干煎服岫雲山人曰亦有屬肝腎虛者急宜大劑養陰須細察左關兩尺弦數無力或弦澀者皆是素問所謂血枯即此症也庸醫不知往往認為肺癰治誤人多矣不知肺癰必見雲門中府相引而痛右寸必弦數異常久則咳唾膿血不止喉中醒臭而已也咽嗌痛咽嗌痛甚不能納唾與食此屬陰虛火炎內經曰形苦志苦病生於咽嗌是也喉痹飲倍加荊芥玄參地黃湯亦妙岫雲山人曰亦有屬風火內郁者宜表散忌滋陰藥遠不及也連珠乳蛾單雙蛾人多知之又有連珠乳蛾人所不知其狀如白星上下相連故名皆由酒色過度鬱結而成最重之候內服喉痹飲外先用碧五金一後用金二碧三喉菌狀如浮萍生喉旁憂鬱氣滯使然婦人多患之輕則半月重則月餘宜守戒忌口次要吹藥得法初用碧五金一後用碧三金二噙清靈膏服喉痹飲以愈為度喉癬喉間生紅絲如哥窯紋如秋海棠花葉背面之狀乾燥而癢阻礙飲食此虛火上炎痰壅肺燥所致要戒鹽醬及助火之物至喉啞則不可救勞症每多生此治用碧丹頻吹清靈膏不時噙化再服喉痹飲岫雲山人曰勞症生此危在旦夕為其金水之氣皆絕也故非咽喉藥物之所能救治喉癰肺脾熱壅熏發上焦攻於咽喉結聚腫痛不得消散熱氣熾盛致團結成癰妨害吐納古方論以一寸為癤二寸至五寸為癰其候使人寒戰咳吐稠濁善用針者審其可刺宜速破之施以點餌之劑又有喉間紅腫而痛無別形狀者乃過食炙煿火酒極熱物品而發病在胃與大腸其重者寒熱頭疼四五日可愈用金十碧一頻吹之內服犀角地黃湯喉瘡奇疾喉中生瘡層層疊壘而不痛日久有竅出臭氣廢飲食宜用枸橘葉燒酒頻服咽中結塊如核危困欲死此危證也飲食不通射干牛舌葉汁海藻俱能治此症總不若百靈丸最佳用百草霜研細蜜丸如芡實大新汲水化下甚者不過四五丸效咽瘡鼻爛咽喉內生瘡鼻孔內亦爛此症若作喉風治之立死宜用白霜梅一個燒存性枯礬一錢山甲珠一錢共為細末吹喉中效喉瘡潰爛喉瘡已破瘡口疼痛難進飲食用豬腦髓蒸熟以姜醋調和食之自愈感寒喉閉不能咽用大附子一枚削去皮臍切作大片以蜜塗炙令黃納口中噙咽其津甘味盡又炙一片而噙咽之鼻生紅線櫻珠咽痛用諸藥不效丹溪云此非咽痛乃是鼻中生一條紅線如發懸一黑泡大如櫻桃垂掛到咽門而止致口中飲食不能入須用土牛膝根擇其直而獨條者洗淨搗取汁入好醋三五匙和勻滴入鼻孔內自然絲斷珠破吐出瘀血其病立安梅核氣痰氣滯塞於咽喉之間咯不出咽不下狀如梅核此因濕熱內郁痰氣凝結治法宜開鬱順氣消痰加味二陳主之用韭汁一杯薑汁牛乳各半杯和勻細細溫服即效喉中如有物妨悶此肺胃壅滯風熱客搏結於咽喉使然憂愁思慮氣逆痰結亦皆能生此疾射干湯主之用逍遙二陳加減亦妙喉中如有炙臠食噎即塞用杵頭糠二合研極細蜜丸彈子大每空心噙化一丸愈為度岫雲山人曰上二症皆梅核氣之類也經云膽病喉中介介然取陽明陵泉心咳之狀喉中介介如梗狀取心之俞亦此類也心之俞即太陵穴口瘡口瘡由心脾積熱又有胃氣弱穀氣少上發為口瘡者其服涼藥不效乃肝脾之氣不足虛火上泛而無制宜用理中湯收其浮游之火外以上肉桂末吹之若吐瀉後口中生瘡亦是虛火宜理中湯忌寒涼口糜聖濟論云膀胱移熱於小腸隔腸不便上為口糜夫小腸之脈絡心循咽下膈抵胃陰陽和平水穀入胃小腸受之通調水道下輸膀胱今熱氣厥逆膀胱反移熱於小腸胃之水穀不得轉輸於下則小腸塞隔而不便上則令口生瘡而糜爛也大抵心胃壅熱則必熏蒸於上不可概以敷藥當求其本而治之口舌狀如無皮曰口瘡口舌糜爛曰口糜當先用淨絲線蘸水輕攪痛者可治不痛者難愈無血出者危攪過用口疳藥吹之服藥宜細辨虛實西瓜絕妙冬日以西瓜皮燒灰噙之五苓導赤合用亦神效岫雲山人曰此症有歷用諸藥不效者餘切其脈雲浮大而數重按無力虛火上炎也投以炙耆熟地歸芍白朮等藥而愈燕口瘡口角生瘡疼痛微腫濕爛有汁此脾胃有熱上攻口唇與津液相搏所致以亂髮燒灰存性米飲調服即以此敷之蒸飯飯甑蓋上汽水洗亦妙口菌生牙齦肉上隆起形如蕈或如木耳紫黑色此火盛血熱氣滯所致用口疳藥吹之或用醋漱口茄母蒂燒灰鹽拌醋調時時擦之以愈為度口中懸癰生於上齶發紫泡者是宜用銀針挑破吹口疳藥或用碧丹亦妙鵝口一名雪口小兒初生月內滿口滿舌生白屑者是也宜先將絲綿攪去白屑以口疳藥頻吹之白殭蠶洗淨炒黃色為末蜜和敷之立效口臭連翹為末糊丸食韭蒜之後茶吞二三錢口中濁氣化為清氣此內府秘方口唇腫黑痛癢不可忍先以瓷鋒砭去惡血再用青綠古文錢磨豬油塗之甚良繭唇唇腫白皮皴裂如蠶繭狀或唇下腫如黑棗或本細末大或如慄如瘤皆七情動火傷血或心火傳脾或厚味積熱須要審本症察兼症補脾氣生脾血則燥自潤火自除腫自消補中益氣加梔芍丹皮最妙逍遙歸脾亦可參用若誤進清熱消毒之劑或用藥線結去之必變為翻花敗症凡繭唇緊小不若誤進清熱消毒之劑或用藥線結去之必變為翻花敗症凡繭唇緊小不能開合難進飲食者不治唇生核腫痛如彈先針去惡血次用牛膝燒灰存性新汲水調塗之內服防風湯唇瘡此氣鬱也白荷花瓣貼之甑上氣水洗之俱效白梅花瓣貼之神驗如開裂出血者立止傷寒狐惑症上唇生瘡聲啞者蟲食肛也下唇生瘡咽乾者蟲食臟也皆因腹熱食少腸胃空虛三蟲求食之故與上所謂唇瘡又當別論用川連犀角烏梅木香雄黃桃仁等味煎服唇緊燥裂生瘡青皮燒灰存性豬脂調塗喉痹舌卷按素問曰邪客手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指次指爪甲上去端如韭葉各一壯又曰手陽明之經其病肢痛轉筋舌卷治在燔針劫刺以知為度以痛為輸其傷寒舌卷者又當別論子舌再見即重舌痰也熱也桑皮殭蠶發灰為末以醋調敷金丹吹之最妙或蒲黃黃柏末敷之亦神紫雪亦可針去惡血亦捷木舌再見即舌腫色如豬肝不能轉動或滿口脹塞粥藥不入是心脾壅熱宜先於舌尖或舌兩旁刺出紫血次用筋卷絲綿蘸甘草水潤其唇舌以蒲黃乾薑冰片為末四面頻吹杜其延蔓若唇燥難吹可取蜜潤之蒲黃用生者若出血用炒並多加冰片煎劑用犀角玄參升麻枳殼生甘草陳膽星大便閉加大黃小便閉加六一散木舌異症舌下腫起狀如白棗有青紫筋初起不痛不寒熱漸漸腫大系憂鬱所致舌下紫筋名舌系通乎腎若色白而腫不治初用金碧各半後用金丹煎舌忽腫脹心脾二經受風邪則舌本強不能卷舒久或熱氣加之則腫筋脈脹急勢連咽喉礙於呼吸法宜刺出惡血以百草霜好鹽各半兩同研表裡塗之或用蒲黃末糝之或取蚯蚓數條以鹽水塗咽喉舌上皆立效如神翣舌此症卒然舌大而硬喉腫呼吸不通即時氣絕破棺而治無不立驗用皂礬不拘多少新瓦煅紅色放地上候冷研細用鐵鉗拗開喉關以此藥擦其舌立蘇重舌木舌亦皆治之岫雲山人曰木舌舌腫翣舌此三種大同而小異但木舌漸漸腫硬然不至於塞滿口中舌腫其勢固疾猶可稍緩惟翣舌倏然脹大頃刻殺人其症最急然其病源皆心脾鬱熱所致故其刺法用藥不甚相遠並可通用舌上出血不止又名舌衄心火鬱也用槐花摻之烏賊骨蒲黃末亦佳若但心破而不出血屬心火極盛宜服犀角地黃湯加童便舌出不收名陽強宜補陽以蒲黃末摻之或用珍珠冰片等分為末敷之或以萆麻子油捻紙燒煙燻之皆立收凡舌出數寸須要分辨傷寒產後中毒大驚四種傷寒用冰片摻之或紙卷巴豆一粒納鼻中自收產後者用丹砂敷舌仍令作產子狀以二女掖之而於壁外突擲盆盎作聲驚之舌立上矣余者用雄雞冠血浸之或冬青濃汁浸之即縮入舌縮不能言此名陰強宜補陰舌黑有大孔流血以青鹽芩柏大黃各一錢人參甘草桂心各五分煎服外燒熱鐵烙孔上舌瘡久蝕成穴屢用涼劑不效者上盛下虛也服黑錫丹可漸愈十全大補養榮湯皆可酌用舌根癰舌根生癰紅而且腫用金碧各半吹之煎劑黃連犀角丹皮生地黃生甘草赤芍山梔麥冬連翹木通連珠疳舌下生水泡初起一枚漸至七八枚者是也吹口疳藥以治之舌菌生舌上隆起如菌或如木耳色紅紫心火鬱熾也治同口菌煎劑用導赤散加減齧舌齧唇齧頰心脾之氣恆通於舌陽明之經直入齒縫故邪入心脾則舌自挺邪入陽明則口自噤一挺一噤故令嚼舌治宜清其風火則病自愈按靈樞曰齧舌者厥逆走上脈氣皆至也少陰氣至為齧舌少陽氣至則齧頰陽明氣至則齧唇視至病者補之懸雍垂長咽中妨悶用枯礬鹽花等分研細以箸點之走馬牙疳牙齦腐爛或胎毒痘毒殺人最速色如干醬一日爛一分二日爛一寸走馬喻其速也若鼻梁發紅點如珠者不治上唇龍門牙落者必死用口疳藥加牛黃吹之聖功丹妙極岫雲山人曰走馬牙疳人皆知為火毒而不知痘疹雜症過服寒涼亦能致此蓋寒涼傷胃火土衰微則邪火大肆而成牙疳矣譬如太陽所不照之處其物為濕熱所蒸必腐爛生蟲此理之顯然者也茲時惟以大劑八珍六君養營等湯裁酌與之外則敷以人中白散庶幾可活而醫者不悟益進苦寒之藥致死者多矣可不憫哉此義古人所未發自余發之聞者多不信時有程一士者在座憮然曰吾子今春患痘幼科肆用寒涼且令粥茗菜羹皆煎石膏水烹之竟變成牙疳而不起以此觀之君言豈不信而有徵乎齒痛連腦欲死此腎經犯風寒也不問冬夏腎虛人常有之緩則不救急用羌活附子湯羌活附子麻黃蒼朮炙黃耆防風甘草升麻殭蠶白芷黃柏或用白芷散亦妙白芷麻黃草豆蔻炙黃耆吳茱萸熟地黃當歸升麻藁本桂枝羌活牙槽風齒痛不已齦肉浮腫紫黑色出血久則腐爛屬腎虛兼胃火用口疳藥加牛黃倍珍珠兒茶吹之牙漏即牙槽風延久不愈齒縫出膿甚則齒落若上邊龍門牙落者不治宜外吹口疳藥並內服滋陰降火之劑牙咬生於牙盡咬中牙關緊閉初起勢甚急夜尤甚然不難愈先用金碧二丹吹於牙齦再用黃熟香削一釘漸漸擠進牙門自然漸開然後將金碧丹吹患處牙舌䪞此症屬胃火形如豆大或內外無定處先用金丹後用口疳藥煎劑用六味多加石膏牙癰再見又名牙𤷍風初起有小塊生齦肉上或上下或內外其狀高硬用口疳藥吹之穿牙疔穿牙毒先二日牙痛發寒熱後痛更甚齦上發一紫塊齦肉皆紫黑者是也已破曰穿牙毒色紅可治青色黑色不治用金丹加碧丹吹之內服涼血清火解毒之劑破者口疳藥加牛黃妙牙宣齦癢滿口牙出血牙齦肉赤齒縫出血味酸此實火上攻宜清胃散加側柏葉淡血常滲不已者胃虛火動也宜消風清火滋陰涼血之劑外用珍珠散敷之海螵蛸一錢龍骨二錢珍珠三釐辰砂象皮乳香沒藥冰片各五分研細棉花團指大水濕蘸藥擦患處以指抵實一二次即愈若齦癢者血虛也補血藥中加白芷牙宣不止以絲綿燒灰存性加冰硼少許搽之立效滿口牙出血枸杞為末煎湯漱之然後吞下立止齒縫作脹不能齧物元氣虛也補中益氣十全大補酌用牙黃如金糯稻糠燒灰擦之即潔白如玉牙齦常出臭汗此陽明風熱鬱積用桃仁十五個桂枝芒硝炙甘草各一錢大黃兩錢水煎服小兒馬牙牙齦上有白色如脆骨者是將發此毒即打噴嚏須日日以針挑之頻吹口疳藥自瘳風火牙痛用輕粉大蒜各少許研爛男左女右手按寸關上青布扎定立效或起小泡無害齲齒用五靈脂米許咬痛處少頃溫水漱出有蟲可見雄黃川椒檳榔等分加真蟾酥麝香各少許棗肉為丸塞蛀孔中蟲化為水痛當立止一方無檳榔亦甚神效髓溢奇疾日見牙齒漸長艱於納食此名髓溢用白朮一味煎湯漱服出夏子益奇疾方附錄伏氣病伏氣者名腎傷寒謂非時暴寒伏於少陰寒氣抑鬱內格陽氣始初不病旬日乃發上行於咽門經會之處寒熱相搏而成咽痛脈息微弱後必下利當以辛熱藥攻其本病順其陰陽則水升火降而咽痛自已用甘桔桂半湯主之少陰傷寒成咽痹少陰傷寒不傳太陽寒鬱於外陽格於內致成咽痹大略與伏氣病相似宜辛溫甘苦以制其標咽嗌自通上二症皆類喉痹誤用喉科寒涼之藥必致不救疫氣病有司天運氣過亢其年鄉村染患相似者此時氣乘虛蘊蓄上焦發作寒熱變為喉痛諺名蝦蟆瘟又曰鸕鷀瘟此症甚惡須用辛涼甘苦表裡雙解之品切忌膽礬酸寒鬱遏陽氣尤忌硝黃攻下引邪入里普濟消毒飲主之岫雲山人曰此症解毒雄黃丸亦妙喉管傷寒此症覺喉中作癢難過切不可吃茶酒湯水宜亟用薄荷二分麝香一分為末吹入喉中俟其氣通約出涎水碗許然後吃陳黃米湯半茶杯即愈不知者竟先吃茶酒等物便不可救傷寒發頤凡傷寒汗出不徹日久身熱不解邪結耳後一寸二三分或耳下俱腫痛而口渴名曰發頤此乃遺熱成毒宜速與消散緩則成膿為害不淺方用槐花二兩微炒使黃乘熱入酒兩鍾煎十餘沸去渣熱服未成者二三服已成者一二服胃弱者忌之或用生忍冬藤四兩生甘草節一兩水二碗煎減半入酒一碗煎十餘沸飲之渣敷患處又方柴胡乾葛花粉炒芩桔梗大力子連翹石膏各一錢甘草五分升麻三分水煎不拘時服累驗兩腮腫細辛草烏等分為末入蚌粉豬脂調敷口噙白梅置腮邊良久腫退出涎患立消痄腮生於牙齦耳庭之後症屬肝腎陽明用赤小豆末以雞子清調加蝸牛飛面研勻敷患處如神凡下諸般腫痛皆效若痄腮初起覺癢於毒頂炙六七壯並頰車肩井炙三壯甚良脫頦以酒飲大醉睡中吹皂角末於鼻內嚏透即自上鼻楔生於兩鼻孔內漸長而下垂觸之痛甚難忍以消法點法隨落隨生間亦不治而落未旬日仍復生長殊甚苦楚但用藕牙磨濃汁塗之則蔫枯而落後不復長以微小無用之物有此神效奇功其理洵不可議思天白蟻頭響乃氣挾肝火加味逍遙散最佳若頭中如蟲蛀響者名天白蟻用茶子為末吹鼻中效又天白蟻初起必喉內生瘡鼻孔內俱爛不識治者每認為結毒發為喉疳延爛及鼻內部以致久而不愈須急用白霜梅一個煉存性穿山甲五分焙用枯礬一錢雄黃五分共為細末吹喉中神效此症危險而此方簡易驗如桴鼓妙不可言誤吞針用磁石研末以黃蠟熔化如丸和豆大吞之針共丸藥從大便出又法取蝦蟆眼睛一隻水吞下則針穿眼上瀉出甚是效驗誤吞銅錢金銀釵環之類只以飴糖多多服之久則自出又多齧胡桃肉即消選方升麻湯治喉中痛閉塞不通升麻一兩木通一兩杏仁五錢芍藥三分羚羊角三分射干三分絡石三分上為末每服三錢竹葉七片水煎溫服黃柏湯治屍咽喉閉塞生瘡及乾嘔頭痛食不下黃柏炙五錢木通一兩升麻一兩玄參一兩麥冬兩半竹茹三分前胡三分大青三分上為末每服三錢水煎去渣入芒硝一錢攪勻服如鼻中有瘡以生地汁少許滴入鼻中日三五度不計時候如欲通利加芒硝不欲利者去之可也一捻金方治咽喉走馬喉痹腦內生癰雄黃藜蘆牙皂去皮子等分上為細末先噙水一口用藥一米許搐鼻中即吐去涎少時見效射干湯治喉中如有物妨悶善太息口苦射干升麻紫菀百合各五錢赤苓桔梗各三錢木通一兩可為末每服三錢食後溫服如欲通利加朴硝一錢喉痹飲統治一切喉痹桔梗殭蠶玄參貝母牛蒡子荊芥薄荷天花粉甘草前胡忍冬燈心清靈膏專治喉癬薄荷三錢川貝母一錢甘草六分玉丹二錢元丹一錢冰片三分百草霜六分上為末蜜調噙化隨津唾咽之防風湯治唇生核防風黃芩前胡知母乾地黃玄參升麻大黃炒桔梗藁本甘草炙麥冬梔子獨活各五錢菊花一兩上為末每服三錢水煎於食後溫服日服三次金丹吹藥上等統治一切喉症消痰利腫如神槍硝一錢或八分生蒲黃四分牙皂分半白殭蠶一錢冰片一分上為極細末瓷瓶收固勿令走氣碧丹次藥百草霜匙半甘草灰三匙冰片五釐元丹一釐玉丹三分薄荷去筋多少合宜上為細末瓷瓶收固春夏薄荷多玉丹少秋冬玉丹多薄荷少欲出痰加制牙皂少許凡喉痹初起金丹不宜多用其性善走功能達內輕症則不能勝藥矣碧丹消痰清熱祛風解毒開喉閉出痰涎最效不比金丹迅利凡喉癰乳蛾等輕症祗用碧丹重症金碧合用初起碧九金一吹過五管後碧七金三症重方用金碧各半痰涎上壅時金六碧四因病之重輕定藥之多寡無得疏忽最宜斟酌無痰莫浪用此皆仙方禁劑也再又效方碧丹二分元丹一釐薄荷二分冰片一分百草霜五釐牙硝三分甘草一分硼砂五釐共研細末收貯勿泄氣制玉丹法明礬碎如豆大入傾銀罐內火煅不住手攪無塊為度次用好硝打碎徐徐投下十分之二三又用官硼砂打碎亦投下十分之三少頃再投入生礬俟烊化復如前投硝硼如是漸增直待鋪起罐口高發如饅頭樣方止然後駕生炭火煉至礬枯用淨瓦一片覆罐上片時取出將牛黃真者少許水五六匙和之即以匙杪滴丹上將罐仍入火烘乾取下連罐並瓦覆在潔淨地上用紙蓋好再用瓦覆之過七日收取選留輕鬆無豎紋者用之佳制元丹法取肥白燈草將水濕透用竹筆套完固者以水濕之將濕紙塞緊一頭納燈草於管中以筋築實至滿濕紙封塞入火煅之俟煙絕管紅取出放濕磚上碗覆待冷剝去外面管灰兩頭紙灰取內中燈草灰黑色成團者雪梅丹取大青梅不拘多少劈開去核將明礬入內以竹籤釘住武火煅梅燼勿用止用白礬輕白如膩粉者佳用以出涎清痰甚捷岫雲山人曰雪梅丹功並角藥而和平過之且簡易便於修合洵秘方也牙痛仙方即聖功丹硼砂五分蒲黃一錢人中白一錢黃柏一錢青黛一錢兒茶一錢馬勃一錢甘草節八分冰片五釐麝香五釐殭蠶五釐上十一味窳細收貯每用時先以水漱口淨然後吹藥數次即愈矣岫雲山人曰此方之妙可比人中白散而其效過之余故名之為聖功丹捷妙丹統治牙疳口瘡口角流涎爛喉癬喉瘡等症兒茶一錢黃柏一錢五倍子一錢二分薄荷一錢五分青黛八分貝母一錢冰片二分上為末收回每吹少許即愈樞扶氏曰此方乃自制每用輒效故錄傳之以濟世人雄黃解毒丸治急喉痹已死者猶可治雄黃鬱金各一兩巴豆十四粒淨共為末醋煮麵糊為丸綠豆大每服七丸清茶送下吐去痰涎立效如已死者挖開口研灌之此羅太無神方也證治匯補加白殭蠶二錢芒硝五錢尤妙孫押班神方牙皂明礬川連上各等分新瓦焙為末每用五分吸喉中立愈又秘方取明礬五錢研末置鐵刀頭上將蜘蛛七個入礬內刀下以炭火熔礬以枯為度共和為末每用一字吹喉中吐出稠痰立效蜘蛛取大腹有蒼黃膿者佳又捷徑驗方喉閉乳蛾皆治鮮土牛膝根一握艾葉七片搗和取汁入人乳數匙灌鼻孔中須臾必有痰涎從口鼻而出神效無比一方無艾葉口疳良藥方兒茶一分半薄荷三分生甘草半分真珠五釐白芷二釐半冰片三釐黃柏一釐龍骨醋煅二釐上為末吹患處神效初起熱甚倍薄荷腫痛倍白芷久病多加真珠兒茶龍骨即長肉痘疹後去龍骨黃柏加牛黃疳重加滴乳香硃砂各少許碧雪散專治積熱口舌生瘡兼治喉癬寒水石石膏馬牙硝芒硝朴硝硝石上各等分用甘草湯入六味火熬令熔再入青黛和勻傾出候冷即成霜矣研細收固每用少許噙化喉痹則以竹管吹入黃袍散治一切口疳真黃柏三錢川黃連三錢蘇薄荷一兩生甘草三錢冰片少許緣袍散治口疳腐爛上銅青一錢白芷一錢甘草五分上為細末同黃袍散吹之菊霜一名元女丹專治風火牙痛防風羌活石膏川芎川黃連荊芥玄參甘草黃柏槐角連翹黃芩甘菊花薄荷白芷上十五味各二錢共為粗末另將甘草五錢煎水入藥拌勻須要乾溼得中放銅杓內再用潮腦六錢勻灑藥上淨碗蓋好鹽泥固封微火升三炷香切忌武火恐其焦灼升足取碗底白霜瓷瓶收緊勿使見風走氣其升過藥仍可拌甘草水加潮腦依法再升一次每用三五釐擦痛處以涎出為度擦過三次可保永不再發蟲牙升藥治蟲牙最效川椒末樟腦等分上放銅杓內茶盞蓋密稠麵糊口封固安爐上微火升之覺樟腦氣透出即取起置地上候冷揭開掃取盞底者收固勿走風泄氣每用少許塞痛處立止貼牙妙方黃柏煎汁去渣龍骨入黃柏汁內煮乾窳極細杭粉山梔各五錢麝香五分先將黃蠟一兩熔了入前藥和勻攤絹上貼牙上一夜取下凡黑處即是毒也甚效咽喉虛實總辨書云咽喉十八症皆屬於火此言其大略也然火有虛實之分證有寒熱之別尤有內因外因之殊及看舌胎蒼老嬌嫩之辨臨證審明復切脈之虛實有力無力脈與症合然後立方施治未可概執為風熱實症也今時之人本質腎陰不足居多而喉症屬實者少或虛中兼實實中兼虛或下焦陰火發為咽痛口瘡者亦復不少然六氣之中感發喉患不獨風寒與火而暑濕燥亦然唯暑濕成咽痛者特稀每感燥而發者多蓋因腎水不足故也若臨證不辨明一見發熱便施表散凡屬風者雖得其宜或由寒者則非辛溫不可其屬火者固宜清降亦當辨其虛實與郁唯實火宜清降虛火則當壯水鬱火則宜升發至濕與燥又豈可表散耶在他症虛實或難辨而喉症最最易明可一望而虛實立判蓋有形可據有色可參有舌胎可辨且痰涎有清濁之分必須臨證者潛心參究乃得其竅至於機巧權變雖存乎其人亦要從方脈中理會得來庶無貽誤耳各證分辨一家傳喉科雖有三十六證之名而治法不外紫地湯一方何也緣三十六症皆由風熱壅塞於上焦觸感而發驟起疼痛形症各別所屬則同故以一方統治之如果系風熱實症依法療之無不應手而愈若屬虛症及感燥而致者必不見效倘執呆方定多貽誤也一實症起初發熱惡寒頭疼喉內紅腫有形而痛不能飲水痰涎多稠按脈浮數有力舌色蒼老堅斂而黃咽間閉塞大小便或亦閉結乃極重之症可用風路針針少商少衝合谷及風池囟會數處其餘諸穴不可妄針原用針者急瀉其內蘊之熱即發汗之義故不宜多針其次用辛烏散取吐痰涎使蘊熱之邪從涎而出吹回生丹以散其熱結之痹服紫地湯宣通肺胃風熱之壅實若大便閉者加玄明粉降火祛熱消痰涎去臟腑宿滯皆從大便而出汗吐下三法合治乃分三路以瀉之蓋因咽喉為關要失治則閉又恐風熱毒邪內攻緩則不及凡實症必須依法而治之如屬虛證則斷乎不可一初起似瘧怯寒發熱者乃喉患之本象也並非外感風寒切勿妄用羌獨活秦艽蘇葉桂枝等味蓋喉患本發於臟腑非太陽膀胱表症也若謂開首必須表散以為層次治法此依稀影響之醫從事俗見究無根柢之學殊不知火被升散而愈熾熱得辛溫更致陽盛則閉必輕則致重重則致危莫可挽救且沈氏尊生集亦言喉症最忌發表無論初起惡寒發熱與否只須辛涼而散兼養陰以制之不必祛熱而熱自除喉患亦漸鬆減乃閱歷已久驗效且多故敢語此一初發熱不惡寒咽間微痛或紅腫而色淡或腫處皮色帶亮或腫而色赤不潤痰涎清薄且少皆屬虛候及下焦陰火或由感燥而發乃本於水虧不能制火故也經云驟起非火緩起非寒而實熱虛寒務須審確有似實而非實者必須證之以脈惟浮數有力者方為實症若細數無力或右部大於左更屬虛症矣而紫地湯辛烏散皆不可用即回生丹亦不宜吹只用青雪丹治以辛涼而散兼採養陰法自更獲效矣一辛烏散惟實症之必需其取痰涎最速能提拔風熱外出即內經高者因而越之之義一兼虛候切勿用之反傷津液而症反加重猶如傷寒治法須存津液為要辛烏散乃劫奪救急之法果系實症立刻取痰涎開關利喉故應效最快惟虛證乃屬內因焉可耗及津液是以不宜用且近來遇用辛烏散之症實少百中不過二三大與曩昔有異豈可執諸呆方而不知權變乎一是症不得以痰涎多寡論虛實有虛候而涎多者亦有實症而涎多者有實症涎少者亦有虛候涎少者但看涎之稠濁與清薄之別凡臨症於吹藥時可審其虛實如果實症其涎流出必稠濁而長不斷其氣穢若屬虛症其涎吐出清薄而短又有吹藥後而無涎者此津液為火所灼更有感燥氣而致喉患者痰涎愈少而治法尤須養陰為要若執定風熱閉塞妄用升散解毒則大謬矣一喉患大小便閉結最為重候必須審明虛實不可妄用攻下有因表散過劑傷及津液以致大便艱者有風熱壅閉於上而不大便者有值燥金之令傷於燥而不便者惟是實症可下若初起或大便閉結亦不宜即下須過二三日看病人形色與夫喉間松減而大便仍未解可用玄明粉下之導熱毒下行即釜底抽薪之法也本科只用玄明粉而不用大黃者因其性峻烈威猛恐傷真氣惟玄明粉味辛微甘能降心火祛胃熱消痰涎去胸膈臟腑宿滯且消癰腫若兼虛症者即不宜用必須潤下法或於養陰中加火麻仁及芝麻之類經云陰血下潤則便通又云腎主二便腎開竅於二陰須知重用大熟地而便自解一針刀更不可妄用其所用者原因叉喉鎖喉閉塞而施乃救急之法並非諸喉症必需之具至於針法又須平日將針灸大成考究及參玩銅人圖熟悉穴道領會補瀉之法方可以言針可笑近來治喉諸輩動輒用針不顧病人痛楚其實可針之穴只少商少衝合谷風池及囟會數處其餘諸穴切不可妄針尤有火窩坑一穴與啞門相連更不可妄針一經失手誤針必立變音啞為終身之患至於用刀之處亦因不得已而施及焉尤宜慎用為要如雙單蛾重舌木舌嗆食風可用刀略破其皮使出血以瀉其勢之腫盛者若初起亦不宜輕用其坐舌蓮花症卻少間或有之亦不必用猶有喉瘤一症屬七情抑鬱及肝腎不足者每患此乃內因之症更不可用刀倘誤犯之致害不淺一牙齦腫疼及牙癰之類皆不宜刀破若妄用之反致延爛或成牙漏骨槽之虞雖古人謂喉痹不刺血喉風不倒痰喉癰不放膿乳蛾不針烙皆非其治也以及內經血實宜決之語皆指症實而勢腫盛者而施之也並非教人一遇喉患不分虛實即動手以刀切之是誠何心哉一咽口症近來患單者多而患雙者少但單者重而雙者輕且實症少而屬虛者多是症初起微腫於會厭之旁一二日猶能吞飲至三四日必腫滿不能飲水凡患左者必腫至右然後漸消方能進飲患右者必腫至左形勢雖重卻無大礙七日必松減而愈是以單咽口之重者在此腫也而雙咽口反輕者因其腫分於左右而會厭之下有空縫可以入飲不過三五日即愈至於治法總不宜用刀屬實症者照本科方療之若兼虛者必須養陰中加辛涼而散治之為妙並以赤麟散和青雪丹吹之自然獲效若咽口腫至上齶形勢極重者可用刀於近上齶邊略為點破使其血出以瀉其勢但不可切深倘深切之其腫雖平而刀痕反爛開須用珍珠散及萬一丹始能收斂與其用刀非宜不若勿用為妙且愈後無刀痕之傷而病時亦少痛苦豈不快哉乃有以恃刀為能事者毋論症之虛實一遇喉腫或雙單蛾咽口喉瘤牙癰齦腫舌腫等症即以刀用力切之血流盈地今日未平次日又切之執定內經血實宜決之旨自信不移孟浪施治及至連切五六次而不愈有因此而成牙漏者有因刀痕延爛經年久不瘥者甚有因刀誤而致殞命者矣然用刀之治未嘗不愈數人但是少耳每有為刀傷而病人畏懼不復來另往他醫求診者並非用刀之妙而愈也何其不知悔悟如是耶一唇瘡口糜舌瘡為最易治之症近來竟遭此夭柱者不少蓋因誤治而致也凡舌瘡諸症必須分辨寒熱虛實未可專執為胃熱心火若妄任清涼或導赤散及瀉心等法其初白瘡必反轉為紅漸有延蔓之勢醫者不察猶謂清之未透復進寒涼而遏之遂至水極似火舌紫唇赤或燥裂而瘡蔓滿舌及延爛至咽喉如白腐以致音啞打嗆氣喘變為敗症而不救是誰之過歟凡小兒口瘡有脾虛不能統涎以致口涎流多及嘴角濕爛而患者有脾陰不足過食甜味而致者有由病後發熱不退而生舌瘡者有屬上焦實熱中焦虛寒下焦陰火而致者有因麻痘後服清涼解毒藥過多致生舌瘡者雖曰口瘡一症而所因不同故當審辨明豈可以舌屬心遂指定心火而執治乎且有傷燥而發口瘡者更須審辨明確毋論發熱與否切忌表散寒涼之劑一經妄投立變音啞而不救尤須養陰清潤為主其熱卻不療而退燥氣就平瘡亦自除矣一舌底青筋上生瘡如半粒白飯此症惟小兒最多或由瘧後而生者有久病後內熱不退而致者有因積滯泄瀉之後而患者有病假熱誤服清涼而生此瘡者統是症各因諸醫不識治者甚多每為認作心熱誤治者亦復不少蓋因舌底筋紋即名舌本故也雖曰屬心其責在脾經云五臟皆繫於舌不獨心也舌瘡則每由脾虛而致焉有發熱與不發熱有早晨不熱而午後熱者有頭維潮熱及手足心熱者總不宜疏散及清熱之藥尤忌寒涼攻下但治法專主理脾切勿認作為火若妄用芩連連翹木通燈心犀角山梔之類其白瘡反轉紅色即延爛漸大甚至舌尖與舌傍亦發瘡連及下唇口角皆有矣猶復認為火盛益進寒涼或另遇他醫亦復如是不至危殆不休深可嘆也其尤可恨者既不審病源不知治法猶悍然誹謗理脾之非何其冥頑之極殘忍之深一至於此耶是皆未究醫道之原本不學無術耳按是症俗名對心瘡以起初色白而論即知屬虛無疑顯然非實火也雖經云諸痛瘡癢皆屬於火是概乎言之非指舌瘡之謂也平日不於薛氏口齒類要集中詳究原理及參考各家方論徒從事於時俗之所尚恃為專科可以惑人賺利籲是乃仁術也執是業者安可偏執而不博約乎凡是瘡潮熱未退者六君加歸芍麥門冬主之若兼便泄者七味白朮散主之或病後脾虛者四君加歸芍寒熱往來者補中益氣主之若瘧後兼腹膨者異功散加歸芍主之或咳嗽無痰間有內熱者金水六君煎主之若中焦虛寒手指尖冷面色青白者理中湯主之凡下焦陰火或因寒涼過甚而唇舌反現紫赤色渴不喜飲以及感燥氣而致者必須養陰清潤非重用熟地黃不效方法見白腐論中吹藥用口疳散或聖功丹若神功丹亦可若屬上焦實熱舌胎焦黃口渴宜導赤散加麥門冬丹皮貝母黑山梔之類吹藥則用青雪丹或聖功丹舌瘡雖曰小疾亦須證之以脈若症與脈合治得其宜則易愈斷無症實而脈虛之理蓋是疾脈虛者症亦虛脈實者症亦實乃最易明曉之處非比傷寒雜症之難辨也一舌瘡最忌慄蒲刺殼煎洗其性苦寒而味澀未用此者猶易治倘誤用洗過其瘡即反延蔓一時難斂誠不易療尤忌以青苔煎洗苔本陰濕而生性大寒涼兼有小毒若誤用致害不淺惟桑樹汁取以塗敷口瘡甚妙其性味甘和塗之不見辣痛且並治口糜等症一舌疳及舌傍兩邊腫疼或舌底生爛宕瘡中間黃白周圍一線紅者皆不易治而諸醫亦不識治無不認為心火每用瀉心導赤如不應便投犀角黃連黃柏知母之類愈涼而愈遏以致舌爛瀰漫或高腫而不能消經年累月變為敗症者比比良可悲夫蓋是症由於七情憂鬱肝木不舒思慮煩悶而致者多經云肝脈系舌傍五臟皆繫於舌非專屬心也故從肝治乃得其旨凡起初未服清涼者猶易療一經寒涼雜進便難施治若論診治之法起初則以黑逍遙散加丹附錄虯村黃泰兄尊堂年五旬余舌底右邊腫起如條長寸許色黃微痛不便飲食結喉右旁亦腫如痰核軟中覺硬初來診治左關微弦投以黑逍遙散吹以青雪丹外敷白芥子香附貝母等末繼進以六味加歸芍已痊其七八因懶服藥迨及半月兼氣惱而腫較甚舌底腫處亦大倍艱於食即依前法毫不效驗乃更他醫用海藻夏枯草香附川鬱金白芍當歸牡蠣等味數劑亦不見應復來求治而外腫更大如覆杯硬且拒按舌腫稍拱起因專用六味熟地加至六錢囑服十劑竟至七劑內外全消而愈前於方中加歸芍即不效六味之妙用其義深矣又上市程治堂封翁素喜煙與燒酒同吃歲己未年屆七旬舌底兩旁忽腫初並不覺妨硬漸醫漸腫硬漸妨言語飲食而諸醫猶皆執定心經蘊熱由於火酒與煙有用導赤瀉心者有用黃連清心者有用復脈飲加犀角者有用生熟地麥冬玄參連翹心蓮子心燈心者亦有用紫雪點者延治一年未見稍效乃遇善於用刀者硬將兩邊腫處切破血流盈地延半月竟歿喉部經絡咽喉任脈至咽喉督脈入喉衝脈任脈會於咽喉足陽明循喉嚨手太陽循咽足少陽循喉嚨足厥陰循喉嚨之後上入頏顙手少陰支者上挾咽足少陽之別上挾咽足陽明上循咽足太陰合於陽明上行結於咽手少陰之正上走喉嚨手厥陰出循喉嚨手太陽循喉嚨足陽明挾咽之動脈上焦並咽以上嗌足太陰脈絡嗌會厭厭小而薄則發氣疾其開闔利厭大而厚則開闔難其氣出遲足之少陰絡於橫骨終於會厭舌部經絡舌舌者心之官也中央黃色入通於脾開竅於口故病在舌本足少陰之脈貫腎系舌本心主舌在竅為舌升明之紀其主舌足太陰連舌本散舌下足少陰挾舌本足太陰貫舌中足少陰直者系舌本足少陰貫舌下足少陰之標在眥腧與舌下兩脈足之少陰上繫於舌手少陰之別系舌本手少陽之筋支者入系舌本足太陰之筋支者別入結於舌本上焦上至舌厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本其濁氣出於胃走唇舌而為味心氣通於舌心和則舌能知五味矣齒牙經絡齒牙手陽明入下齒中足陽明下循鼻外入上齒中手陽明之別遍齒手少陽之筋支者上曲牙足陽明循牙車足太陽有入頄遍齒者名曰角孫上齒齲取之齒者骨之餘也口部經絡口中央黃色入通於脾開竅於口脾主口在竅為口備化之紀其主口手陽明挾口足陽明上挾口足陽明出於口脾氣通於口脾和則口能知五穀矣衝脈絡唇口唇部經絡唇脾之合肉也其榮唇也脾胃大小腸三焦膀胱者倉廩之本其華在唇四白督脈環唇足陽明環唇足厥陰環唇內口唇者脾之官也唇舌者肌肉之本也項頸部經略項頸督脈之別上項督脈還出別下項足太陽下項足太陽循項手太陽循項手少陽上項足厥陰循喉嚨之後上入頏顙足太陽從膂上出於項足少陰系舌本復出於項足陽明之別上頭項足少陰之筋挾膂上至頂手太陽之筋支者循頸出太陽之前手陽明筋直者從肩駋上頸中央之脈督脈也衝脈上者出於頏顙肌肉之精為約束裹擷筋骨血氣之精而與脈系後出於項中喻氏有言曰不明十二經絡動手便錯況咽喉為關要之樞故尤須明晰為要茲於類經所集咽喉齒唇項頸口舌諸經絡附錄於上以備參考庶臨證不致茫然而無所措也喉症白腐例言一是論發前人之所未發為喉科提綱挈領專指屬虛傷燥立言故證治在於肺腎重以養陰清潤為主緣因治驗良多閱歷不爽乃不揣固陋互參而詳辨之俾患是疾者咸登壽域焉一凡病無不感於六氣而是症亦然緣六氣之中惟燥之治最難況乎燥金之發於喉白為尤難故集中專論傷燥之虛而不及諸候之實其餘五氣感發者俱易於辨治或表散辛溫或寒涼清降以及吐下等法隨治自愈安用嘵嘵致辯哉一唯曉六淫之氣為患殊不知六淫之外猶有七情憂鬱郁久而為熱為內傷值燥金之令而發者或本質水虧因嗜食辛辣炙煿之味以致者然則此二者宜表散乎宜清降乎宜辛溫吐下乎抑又作為傷寒伏氣乎乃不於證之屬虛屬實屬寒屬熱屬燥詳察而確別之徒執一症名為空談何異風馬牛之不相涉也為人司命者貴於臨證識治權變活潑為要不在紛紛徒以名目炫惑也至於小兒雖無七情憂鬱然每由先天不足金水失養者亦易於傷燥也一傷寒伏氣考之諸書及醫學心悟名為腎傷寒謂其非時暴寒伏於少陰寒氣抑鬱內格陽氣始初不發旬日乃發上行於咽門經會之處寒熱相搏而成咽痛脈息微弱後必下利當以辛熱藥攻其本病順其陰陽則水升火降而咽痛自己按此即少陰喉痹症也迴非喉白之屬可知若謂伏氣惟伏寒伏暑伏火無容別辨至於伏燥伏風伏濕其義牽強矣即如喻氏陳氏大辟驚風二字命名之謬其理可推又何必穿鑿命名附會其說乎所謂名不正則言不順者即此理也一羌活乃足太陽膀胱經藥直達肌表於喉症非宜且十二經中惟足太陽膀胱之脈上額交巔絡腦下項循肩膊挾脊抵腰結於缺盆不循咽喉則喉患非太陽膀胱之屬明且著況喉白之屬虛燥尤非羌活所宜投也喻氏曰不明十二經絡動手便錯乃有以羌活為能事者不論虛實一見發熱動輒用之只皆因平日不肯詳細參審而隨手寫慣耳殊不知其利害以致貽誤者多矣一是症每誤於不辨虛實忘用表散寒涼者多又因聽信旁言指引專科高明遂遭固執之方之害者更多也一初起未服表散寒涼及升發攻下苦降藥者易治雖屬燥金而肺腎未傷只從本緩治當漸愈一有醫每遇症無論虛實輕重豫存自己地步便云此症極險萬難著手以為交代在先如是任意妄施動手亂挑亂刮輕則致重重則致危莫可挽救此乃不因病死多因治死耳及至後患者仍復如是療之終不悔悟以致一家數口皆遭是阨者不可勝數因而清夜思之無以塞責乃聲言假白腐可療其真白腐證萬無一生如此不學無術之輩猶有為其所惑而深信不疑者不亦謬乎一因畏熟地如砒石及庸醫誹謗之非竟將功虧一簣之際復為寒涼攻下而突變舌黑如墨氣喘音啞目直口張以成敗症者比比此本屬易治不死之症乃遭庸醫而竟殺之殊深痛恨耳一醫門法律首列醫之罪過二十有五條夏卓溪鐵鏡著有九恨詎醫道之難明不特罪過日多而為恨亦益增廣也為仁術者當如是乎一臨證貴於望聞問切之際審察周詳機巧靈變則一切自無貽誤經云望而知之者上工也凡小兒傷燥發為白腐者面色必㿠白帶青鼻聲粗塞手尖必冷右脈必數大於左或兩脈俱數無力其肺腎陰虛無疑先一望而消息已得再證之以脈而虛實立判殊不難於施治也何其忽略而不審辨概用清降瀉利法執定刷板呆方安得使人不夭枉耶是故夏卓溪曰醫有十三不可學也一下愚之人必無慧思不可學一固執之人必難融通不可學縱使熟讀靈素博覽群書徒於稠人中談論覺無人可及一經臨證則舊態復萌仍系故套呆方而已不啻於大涅槃經舊醫客醫之說夫舊醫之治病不別風熱寒溫悉令服乳藥禁用客醫之厲藥由是觀之雖謁大自在而求之豈可得耶一是證或曰土凝霜滷是也考之素問運氣篇五郁之發論曰金鬱之發天潔地明氣清氣切大涼乃舉草樹浮煙燥氣以行霿霧數起殺氣來至草木蒼乾金乃有聲山澤焦枯土凝霜滷怫乃發也其氣五又曰燥勝則乾陽明所致為收為霿霧金燥受邪肺病生焉陽明燥化施於厥陰陽明所致為煙埃為霜為勁切為悽鳴陽明所致為燥生終為涼注云金位之下火氣乘之故陽明生涼終為燥也又曰火鬱之發有土浮霜滷愚按喉白形色如酒罈中傾酒時浮出白腐一般此由熱鬱於內從濕生焉因壇中沸熱之氣閉悶不得泄陰氣凝則霿霧厚即土浮霜滷之義此熱鬱之屬而非燥生也夫燥為肺金之本象值陽明之令感發而燥益甚是以土凝霜滷由燥氣行故山澤焦枯土面凝白滷結為霜其發也在氣之五以土凝霜滷較論近是是亦緣本於燥也然則論治當養陰清潤乎不當養陰清潤乎乃有明知為土凝霜滷而臨證仍復茫然用藥尚習故套是誠何心哉若謂從俗易於近人併為行道之法門其如蒼生何籲為人司命者能無惻隱之心乎一肺實可瀉肺虛則斷不可瀉白腐發於燥者實由肺虛而致之也故桑白皮馬兜鈴之類毫不可犯用之速其殆矣皆因醫者囿於所習不肯於肺虛處考究執定為蘊熱實症治之以此每多致誤虛實之辨毫釐千里焉可忽諸一小兒陰虛非謂血分之陰虛乃真陰腎水之不足也真陰之不足由於賦稟之故耳況今之稟受十有九虛而所因實亦緣氣化之薄故燥症多本於水虧且燥為肺金之本象若金水相生得浚其源而安其流何燥之有縱值燥令亦無所傷是燥之襲虛皆由真陰不足而致之也試思論治當如之何論白腐證喉間白腐一證俗名白菌即白纏喉是也廿年以前此症患者尚少邇來染是疾者甚多每為誤治而夭者不知凡幾深可憫也凡大人患此症猶易施治惟小兒為尤難蓋因其幼小體質薄弱脾腎不足故也是以小兒之白腐證多於大人必且傳染若治之不善易於次第夭傷甚至一家數口皆遭是阨按此症由肺腎陰虛因以感受天時燥金之氣即傷燥之候也或云傷寒伏氣者非也有云少陰慢喉者亦非也又云疫癘爛喉者更非也但初起有發熱與不發熱之別有熱者重不熱者輕即起初發熱亦切不可發表若認作外感發熱用羌獨活秦艽荊芥之類一經表散而燥當更盛其白腐愈蔓其熱亦愈熾鼻孔必轉塞不通甚至音啞打嗆氣喘等症俱作而不可救矣張會稽曰火得升散而愈熾沈金鰲曰凡喉風諸症總不宜發表何況白腐之屬燥乎是以發表與寒涼之品毫不可犯執認肺胃蘊熱又兼風邪必先表散以為層次治法定然貽誤不淺即如牛蒡子射干山豆根本草雖載其能清利咽喉解喉痛桑白皮黃芩瀉肺熱桔梗開提肺竅殭蠶解喉痹痛以上諸品皆系療咽喉要藥惟白腐一症最不相宜倘妄用之必變音啞打嗆氣喘而不救若執而不悟復認為肺熱閉塞再投麻黃枇杷葉石膏犀角羚羊角馬兜鈴等味即變胃爛發癍而斃矣至於喉科所論攔定風熱攻上不下之語及用紫正散以角藥探吐又有因未大解遂用生大黃玄明粉以下之更速其死是皆未探其源也凡症有寒熱虛實之別惟有白腐一症雖有寒熱屬實者絕少而屬虛者多若初起見喉兩旁紅腫而後起白者屬實中兼虛為易治或誤用表散及吐下法其症必淹纏日期及至重用養陰而後得漸痊可若屬虛證值陽明燥金之令而汗吐下三法及雄黃解毒丸紫金錠等劫奪之劑一經妄投誠難救矣凡初起喉間不紅腫即有白腐或厚或薄或有如稠糊及發熱者乃最重之候其源責在肺腎陰虛其脈必浮數無力手尖必冷切不可投以表散及寒涼之品而治法務須養陰清潤始不致誤總之認定一燥字主治乃活人心法也每見誤治者必變音啞打嗆鼻塞痰響氣喘而殞其為肺腎之屬可知知非肺胃風熱外因之邪益可知也或論既屬肺燥而致則喻嘉言之清燥救肺湯與夫古方之瀉白散最該對症殊不知救肺湯中有石膏枇杷葉阿膠乃清肺實之熱其瀉白散系驅肺氣之逆而瀉氣之有餘惟是白腐症乃由肺虛感受燥氣而發故此二方俱不相宜若果肺氣實者無是患也且歷按是症發於春秋二季值天時亢陽之際居多當炎暑夏令竟少而冬燥亦有之總由燥金之為患然六氣之中惟治燥最難而況發於咽喉白腐之燥乎當知此燥之為患與他燥火諸症不同書云燥為六氣之一肺金之本象也受熱則燥更從火化也燥在內則津少煩渴在上則咽焦鼻乾蓋金為生水之源金被火爍腎水失其源矣安得不五內炎蒸臟腑燥烈雖似有餘實為不足經云秋傷於燥上逆而咳發為痰厥可見上虛必虧於下子母不能相生故也又曰腎苦燥急食辛以潤之又曰諸澀枯涸幹勁皴揭皆屬於燥馮楚瞻曰涸者無水液也乾者不滋潤也勁者不和柔也皴者皮膚啟裂也澀者如諸物濕則滑澤干則澀滯是皆爆金之化然燥之標由於風與火而燥之本實根於脾與腎蓋脾精不能轉輸而陰精不能上奉所以肺失化源自見其象耳故幼稚本質脾胃及腎不足感燥氣而發是症也是以治宜生津養陰滋潤為主豈可妄施表散而繼以寒涼者乎稽之方書本無白腐之證尚無是症論說邇來患此者甚多及至傳染難已猶之痘疹漢建武以前並無論到至宋錢仲陽立說相傳而今之白腐證亦如痘疹隨時感召而發此亦天氣懸殊之故也耶惟是今時幼稚稟受怯弱嬌養柔脆先天不足腎陰未充者恆居多數錢氏獨具卓識創論以六味調治小兒培陰以配陽其義甚為深遠若小兒一患白腐肺腎必然兩虛生化之源遂失水竭則腎涸腎涸則下泉不鍾而陽盛於上其燥益熾斯喉痹音啞痰結煩躁打嗆等證作矣書云肺為諸臟之華蓋清陽出上竅濁陰出下竅咽主地氣喉應天氣屬乾金為肺之系喉以納氣故喉氣通於天咽以納食故嚥氣通於地又肺開竅於鼻肺氣通於鼻鼻主天氣又精氣通於天故值天時燥氣之令即從鼻入而肺先受之輕則發咳不已重則發為白腐之患也且肺為清肅之令宜降而不宜升況邪之所湊其氣必虛凡肺氣充實者故無是患也要知諸氣膹鬱則肺氣必大虛若泥於肺熱之說投以升提及瀉利之劑反從火化而燥愈熾亡可立待耳是以桔梗一味首在切忌古人雖以甘桔湯治諸喉患是取其宣肺之壅實斷非指燥氣之喉症也今人不思其法徒執此方為治喉要藥殊不知是症非喉病也乃肺燥發現於喉也若泥以喉風諸藥治之安得不誤蒼生者乎第此症不易冒昧從事務於喻氏及張氏醫通與馮氏錦囊所論燥症門條中參究而領會焉庶幾無舛誤耳或曰盡系六淫之氣為患本屬不治之症又云真白腐症亦不可治假白腐可療此掩飾之詞混入聽聞之語耳凡病兼外因無不感於六氣非獨白腐一症也若謂六淫之氣皆蘊蓄於內而發則無是症亦無是理也盍專指一燥字施治則得之矣至於真假之辨尤屬荒唐惟有詐病為假真寒假熱真熱假寒為假除此及真頭痛之外病何真假之有哉或分虛實言之未嘗不可以實症白腐為易治而虛白腐為難治是或一道焉有云白腐一症責在君相二火必須以瀉心平肝兼治此臆度牽強之語烏足以言醫夫二火或發於咽喉他症者尚有之若執此以論白腐則大謬矣即謂二火為患亦由腎水之不足腎水之不足則由肺金失生化之源也張戴人曰識得標只治本治千人無一損斯言也安可忽諸嘗見師心自用者泥於君相二火每縱用燈心川連龍膽草犀角羚羊角等味致使夭枉者比比而猶自矜獨得之妙終不悔誤良可悲夫即近來患諸喉症亦由感燥者多非獨白腐為然也臨症若不審辨泥用風劑治之輕則致重重則致危而不誤者鮮矣余經治以來每用清潤養陰法獲效甚廣遇用風藥者間或有之而家傳之紫正湯辛烏散等方則未嘗用及奈屬實症甚稀而陰常不足者恆多也王太僕云壯水之主以鎮陽光斯義誠深妙哉或問曰所論白腐由傷於燥兼值肺腎不足當禁用寒涼及辛散攻下等法第見有用羌活桂枝而愈者有用防風牛蒡子荊芥桔梗而效者或用大黃玄明粉而應者或用川連石膏犀角而平者復有用附子乾薑乃痊者此亦皆治喉之法何其相懸之若是耶誠哉問也凡症有寒熱虛實之不同原不可執一而論其用辛溫表散攻下發汗清涼而愈者俱是屬實之症乃喉內紅腫有形而後起白腐之類斷非咽間無形之白蔓延纏喉可比而六氣之中凡感受風寒暑濕與火之邪而發喉患者亦所時有非止白腐傷於燥也其感受風寒暑濕與火發諸喉腫而起白腐者此即妄言假白腐證易治是也至於傷燥及腎陰不足而發白腐者即其稱真白腐證萬無一治是也如果白腐有真假之別則經治之間即當分真假立方才是何得概泥一方而統治之耶其間豈無虛實寒熱之別辨乎試問究屬風熱實症之真白腐不能治乎抑屬肺腎陰虧之真白腐不能治乎何嘗分別而言焉然肺腎陰虧之白腐既不知治法又恥下問乃固執自是之呆方照尋常諸喉患療治安得不誤蒼生者乎趙養葵曰世人皆曰金生水而予獨曰水生金夫肺出氣也腎納氣也凡氣從臍下逆奔而上者此腎虛不能納氣歸元也毋徒從事於肺或壯水之主或益火之源肺向水中生矣唐笠三曰水生金乃金生水之對面曰世人但知其一面而不知又有彼一面也由是類推而白腐之傷於肺燥不亦宜乎善悟者當更得其旨矣論治一是證輕者微發於咽旁重者其白蔓於喉及喉管至極重者其白纏滿肺系以及肺內皆有非僅現形於喉部也是以打嗆音喑鼻塞氣喘齊作皆由白腐黏塞於內之故所謂有諸內必形諸外者也試思辛溫表散攻下寒涼等法可施否乎一經妄投其白在內浸淫愈甚肺氣益虧更速其殆不過七日發喘而斃矣一白腐切不可動手用刮及妄施針灸此原屬內因虛候非風熱實症之可倫嘗見有用牙片將白腐強刮以為立時取效希誇妙手之名殊不知動刮之後其白雖去旋覆萌發必較前更劇且刮時每致傷出血而腐處痛益甚症亦增重矣因刮傷而致殞者蓋亦不少然猶執而不改不識從何處得來如此神奇竟不肯舍即如舌瘡糜爛亦動刮之是誠何心哉將謂刮法易效效捷於湯液之治勝於一匕活人其功豈不大哉無如動刮之後每多不救籲過而不改是謂過矣為仁術者當如是乎一白腐不挾雜證猶易施治倘兼他症或發癮疹流丹斑瘭又壯熱不退等候最難著手須知丹疹斑瘭有陰陽之別及虛實之分不得執定風熱實火使用石膏黃連黃芩花粉犀角等味一經妄投轉為內陷必致循衣摸床直視譫語諸敗症現矣洵難救治若體質屬實或口渴引飲大便閉結小便短少脈數有力審明證與脈合舌胎焦黃其喉間白腐勢輕而渾身丹斑之勢重色赤如丹砂亦須養陰中或加石膏山梔炒芩之類清之可也倘本質虛弱肝腎不足其白腐重於丹疹兩脈虛數無力口不渴或渴不喜飲舌苔柔嫩無焦黃色此乃浮游之火騰越非實火也書云火之有餘即水之不足切勿徒從事於丹疹只須注重養陰兼以清潤斯一舉而兩得矣一丹疹每因喉患初起有發熱惡寒之作醫者不察所因擬為時感之症輒誤用蘇葉桂枝乾薑附子羌活厚朴之類陰液為其所灼鼓動浮游之火燥中加燥以致逼出丹疹此乃屬無根之火假使妄施寒涼則水極反從火化其誤不淺一白腐發於嚴寒者因寒邪蘊而為熱起初不知病由認作感受寒邪誤服乾薑蔥湯以致喉痛發為白腐其鼻不塞可治若鼻塞及胸脅築悶則誠難治緣肺熱還傷肺也如發熱時喉內兩旁紅腫而有白腐者宜先用荊防薄荷牛蒡子之類微疏解之再用治白腐法而患自平若頻進祛風散寒及辛溫之劑白腐未必能除即變生他症或且胸築痰鳴氣喘等候作矣一白腐俗呼白菌凡鄉隅小兒患此者土人嘗取樹上所生濕菌煎洗及與菌湯服之其輕者間或有驗重者每多致誤第不識從何處傳來以菌治菌誠可嘆也一蘇郡近出吳醫匯講一書內有爛喉丹痧論蓋即吾鄉所患之白腐症也其論三則一唐子迎川一祖君鴻範一李子純修皆云近來患者甚多患而死者亦復不少並易傳染方書未詳言及治亦無從措手唐氏云或言辛散或言涼解或言苦寒俱師心自用各守專門未嘗探其本源乃引仲師金匱書陽毒之為病以升麻鱉甲湯主之指內經熱淫於內治以鹹寒佐以苦甘之旨而祖君則論是症之所來不外乎風寒濕熱時厲之氣解表清熱各有所宜治之得宜當愈不移時治失其宜禍生反掌若漫用寒涼則外益閉而內火益焰咽痛益劇潰爛日甚不明是理者反云如此涼藥尚且火勢勃然猶謂寒之未盡於是愈涼愈遏以致內陷而斃者有之或有議用清涼者乃以郁遏誹之炎熱燎原殺人最暴此偏於散而謗誹清者之為害也彼言散之宜此方散之禍彼言寒之禍此言寒之宜要惟於先後次第之間隨機權變斯各中其窾耳李氏之言則云譬之於物以盛火煏之只見乾燥而不知濕熱鬱蒸所以致腐耳其患之處色白如粉皮樣或腐至小舌鼻塞閤眼朦朧者皆不治之症總之因天地不正之氣感而受之故體有虛實之不同即症有輕重之各異瀚按三子所論皆指風熱濕寒屬實症而言未嘗悟及傷燥與夫肺腎陰虛之爛喉也是故外因諸實症易曉而內因不足之咎人每多忽略焉至唐氏引金匱升麻鱉甲湯法分陽毒陰毒之義亦尚未妥善也一白腐固有寒熱虛實之分不盡屬於燥之一端有因風寒蘊蓄而發者有受風熱侵越而致者有嗜食炙煿辛熱之味熏灼而患者有實中兼虛者亦有虛中兼實者有似虛而屬實者亦有似實而屬虛者證各不同治當分辨未可拘執呆法至於宜表散宜辛溫宜清涼宜溫補宜養陰貴在乎臨證之際機巧權變神而明之庶幾其可耳方論一證有不同而吹藥之治亦須分別良未可以一方而遍施也如外科正宗之金鎖匙冰硼散乃治屬實症之喉風非白腐症之所宜用且近來諸喉患用之尚不甚效何況白腐之屬燥屬虛者乎嘗見治喉之輩無論虛實均以此丹吹之尤有於呂雪丹中加辰砂者殊不知焰硝雄砂皆劫奪之品豈可施於白腐爛喉之症乎但用此藥吹之已經相反又加之湯液非宜安得不夭枉人命者耶一白腐最忌酸鹹澀味點染如白霜梅殭蠶牛膽膽礬枯礬牙硝玄明粉之類一呂雪丹惟於紅腫有形而起白者宜之一本科辛烏散不宜用倘妄用之其白腐更甚而症反增劇矣一神功丹最相宜其人中白鬚要經歷霜雪陳過數十年者方佳若新者不可用一柳華散亦不宜妄用一麝香皂角藜蘆皆不宜用冰片宜於少不可用多一治法凡咽內不紅腫而起白者開首必須辛涼而散於湯液中只用薄荷三四分不可用多多則泄汗亡陽反傷肺氣若現鼻塞音啞打嗆氣促鼻煽等候而薄荷即不宜投如辛涼不應亦不宜再進即當以養陰清潤為主勿論其發熱與否專養陰而熱自除喉白亦必漸減矣雖曰方書未詳言及一經闡發明哲又何難治之有耶至於小兒本由肺腎不足而發是症復為庸醫妄投表散攻下以致肺氣益傷發喘鼻塞音啞打嗆而舌未黑者惟用獨參湯頻進可救一二無奈人參近今價貴極矣萬難應用即費去重價亦少真者用亦無益醫雖有方藥難應手不亦殆哉內服方養陰清燥湯治肺腎陰虛感燥而發咽痛白腐纏喉及口舌白瘡口糜唇瘡等症方雖平淡無奇而神效甚捷誠喉科之津梁也老子曰下士聞道大笑之不笑不足以為道此則聞方大笑之不笑不足以為方大生地二錢大麥冬二錢川貝母八分粉丹皮八分玄參一錢薄荷葉三分生甘草五分水一鍾半煎至五六分溫服如發熱者不必拘泥外感之有無只照方投之而熱自退如鼻塞音微喑氣急者去薄荷加玉竹二錢北沙參二錢若舌胎黃色而唇燥者加真釵斛一錢肺熱咳嗽加干桑葉三片大便閉結三四日未更衣者加叭噠杏仁去皮尖研末八分黑芝麻三錢或火麻仁二錢亦可如時行燥疫易於傳染者加陳人中黃三分陰火盛而咽乾不潤者加大熟地三錢天門冬去心二錢女貞子一錢若屬體質虛弱兩脈浮數無力或潮熱不退者去生地重用大熟地而熱自除或白腐已減尚有些微滯於咽間不得退淨者亦須重用大熟地至五六錢其白即除矣屢經效驗不爽足徵責在肺腎可知如喉白概已退淨可用炒白芍八分甜百合二錢以固肺氣淮山藥亦可加入瓊玉膏此方治傷燥及肺腎不足白腐音啞打嗆並臻佳妙大熟地一斤北沙參二斤玉竹一斤白茯苓六兩白蜜糖八兩上將地黃用竹刀切碎同沙參玉竹茯苓用長流水入大砂鍋內熬汁以熟地汁盡渣枯為度再過濾力絞去渣加白蜜再熬成膏另置淨瓶內以蠟封固懸水井中一晝夜取起再隔水煮半日每用開水點服神效非常切勿因平淡無奇而輕視之兩富湯此方金水相生治白腐音啞甚妙大熟地一兩大麥冬一兩取長流水與井水各半煎濃徐徐服之兩儀湯治白腐打嗆音啞氣喘等候莫妙於此方真乃救危之法未誤服表散辛溫之劑者均可以挽回若經誤投雖用此亦無能為矣人參大熟地用長流水煎服或加麥冬亦可甘露飲治喉白咽乾不潤咳嗽唇燥舌乾等候大熟地三錢大生地二錢玉竹三錢大麥冬去心二錢天門冬去心一錢馬料豆二錢炙甘草四分是方得人參更妙井水二鍾文火煎服證治總不外乎辛涼養陰清潤若稍兼疏表不惟不效且反增劇亦有初起即不宜辛涼遂當養陰者種種權變須存乎其人非呆法可定也吹樂方聖功丹治咽痛白腐糜爛口舌白瘡口糜唇瘡舌爛舌根白瘡諸症並臻神妙青果炭一錢鳳凰衣一錢兒茶一錢川貝母去心一錢黃柏八分薄荷葉八分冰片五釐上各藥另為細末絹籮篩過再為和勻加入冰片同窳收固勿使泄氣每吹少許腐爛重者加人中白二錢神功丹此方亦妙人中白煅二兩川黃柏六錢真兒茶六錢漂青黛六錢薄荷葉六錢真梅片六分上各研極細過篩將分兩稱足和勻再加入冰片同窳收固秘妙丹治喉爛白腐口瘡等症大蟾蜍一隻於端午日取系懸於陰處俟干置陰陽瓦上以文火煉酥不可炙焦研極細末略加冰片二釐窳勻收固每吹少許甚妙藥性不宜於白腐爛共六十八種一羌活凡喉風諸症首在切忌於白腐尤屬不宜蓋羌活乃手足太陽引經之藥散肌表寒邪利周身疼痛與喉患全不相涉何必表及無辜而今時之醫一遇喉症動輒用之以致症之轉重而不能收功者有之猶執迷而不悟遇後來者仍復用之洵可嘆也善治者無論風寒發熱之與否從未用及使其有熱自退且喉患易愈亦不愆期豈不更妙乎一獨活入腎與膀胱兩經專理下焦風濕痛痹亦非喉症之所宜投也一秦艽本入陽明清火藥也治風寒濕痹利小水解溫疫熱毒或牙痛口瘡發熱者可用一桔梗療諸喉風相宜一兼虛候則當慎用至於白腐證大相逕庭蓋其有升無降開提肺竅能載諸藥上行其肺實者固可用而肺腎陰虛之白腐證則不宜升提開竅犯之必反劇猶有不識病者輒妄用至二三錢以致肺氣益虧而愈閉乃覆加石菖蒲以助之其不殆也幾希一射干苦寒有毒本草雖載為治咽喉痹痛要藥療實熱症則可若實中兼虛者即不宜施用至白腐之患又豈苦寒有毒之味所能療者耶一山豆根大苦寒固有治咽喉之名或於實症喉痹稍可若論白腐本屬肺虛燥症豈可妄投亦不宜與射干之苦寒並用識者當慎之一桑白皮為西方之藥甘辛微苦而氣寒仍瀉肺實之火雖清肺止咳喘然亦非白腐所宜張會稽曰既瀉肺實又云補肺則未必然李士材曰古稱補氣者非若參耆之正補乃瀉邪所以補正也愚者信為補劑而肺虛者亦用之大失桑皮之面目矣且市中近來所貨者每以山楂根充售更不相宜其真偽尤不可不辨也一荊芥又名假蘇乃解肌發表退寒熱清頭目之藥亦稱利咽喉惟於白腐不宜不可因利咽喉而遂用之即荊芥至賤之物亦有假者或云野蘇為之一龍膽草大苦大寒肝膽經藥也時珍曰相火寄在肝膽有瀉無補故瀉肝膽之熱正益肝膽之氣也但大苦大寒過服恐傷胃中生髮之氣及助火邪亦久服黃連反從火化之義也雖療咽喉風熱切不可投於白腐之證一黃連大苦大寒為治實火之主藥惟於喉症不可妄用一黃芩苦寒之品入心勝熱解瘟疫清咽喉療肺胃實熱時珍曰肺虛不宜者苦寒傷土損其母也白腐症庸可施乎一白前治肺氣壅實胸膈逆滿虛者禁用一燈草心瀉肺熱降心火治五淋除水腫惟燒燈心灰能療喉痹勿因其瀉肺熱而用入白腐諸症一地骨皮苦而微寒乃退陰虛血熱有汗之骨蒸及肺腎胞中陰虛之伏火亦能滋水養木於白腐雖無礙然可勿用一天花粉味苦寒氣味頗輕最涼心肺善解熱渴亦不宜於白腐一連翹苦辛微寒手足少陽陽明手少陰之藥瀉心經客熱降胃濕熱諸瘡痛癢皆屬心火故為瘡家要藥惟白腐不宜一豬苓開腠理利小便並非療咽喉之品一殭蠶為厥陰陽明之藥散風痰治風熱喉痹但味辛咸性溫有小毒不利於白腐症一牛蒡子即鼠黏子又名大力子辛溫入肺利咽喉消斑疹善走十二經而解中有散凡喉間紅腫有形起白者可用一屬虛證即不宜投一茵陳乃太陽經藥善治黃疸濕熱豈可投入白腐症耶一細辛氣溫大辛為手少陰引經之藥開關通竅治風寒喉閉雖曰少陰之脈循絡咽喉而肺燥咽痛及白腐症皆不可用因其辛散太過涉虛者尤為不宜且北細辛真者甚少或云葦蘆莖充之一枇杷葉苦辛平肺胃藥也雖清肺降火除痰嗽止嘔噦然亦非白腐之所宜投一茜草又名過山龍色赤入營分味苦性溫行血滯通經脈活血與紅花相同而性更通利凡喉腫色紫熱在血分者宜用其餘諸喉患慎勿浪投一紫荊皮苦寒無毒破血消癰腫然不宜於肺虛諸喉患奈今時諸治咽喉者無不用及殊可笑耳一款冬花辛而微溫入手太陰經能溫肺氣故療咳嗽惟是辛溫肺寒則可用而白腐兼嗽即不相宜一菖蒲味辛性溫心肝藥也行滯氣開心竅明耳目通九竅出音聲仙經歷稱菖蒲為水草之精英神仙之靈藥但白腐之音啞乃為表散及寒涼之品傷伐肺腎而然非風熱閉塞於肺也豈可因其能出音而妄施用耶一羚羊角鹹寒屬木善走少陽厥陰二經故清肝定風於咽喉諸症無所用一犀角苦辛微甘氣寒專入陽明清胃火亦涼心瀉肝能解大熱與風毒陽毒切勿妄施於喉患諸症及白腐發斑仲景先師有云如無犀角以升麻代之者以其功皆升散也今人但知犀角之善於解熱而不知犀角之能升散尤峻速於升麻也可不審慎以用歟一石膏甘寒善祛肺胃三焦之火尤為陽明經實症之要藥若白腐兼發流丹斑疹者切勿輕試一大黃苦寒足太陰手足陽明手足厥陰五經血分之藥也有毒性極猛烈故有將軍之號推陳致新直走不守清實熱行瘀血破結聚本血分之藥若於氣分用之則未免誅伐太過矣乃治傷寒及瘟疫實症之品考之諸本草並未載其治咽喉痹痛尤於白腐大不相宜嘗見潘某治各喉症無不用之是誠何心哉一木通又名通草味苦氣寒心包絡小腸膀胱藥也能利九竅宣血脈消水腫通關節雖有清火退熱之名然後喉患不可妄投一赤小豆為消熱毒利水之品白腐症則最忌利水也一升麻微苦氣平微辛乃脾胃肺與大腸四經之藥取其升散提氣解膚腠風熱斑疹引石膏除齒牙臭爛腫痛若上實氣壅諸火炎上肺腎不足水火無根及白腐等症則皆忌用一土牛膝苦辛微毒搗汁和入乳療風熱實症喉閉能取吐痰涎立即開關其餘喉患切勿用之徒傷元氣並見不效一馬兜鈴若寒氣薄入手太陰肺經苦降之品清肺熱促止咳嗽喘促體輕而虛與肺同象故專司肺實喘嗽以清熱降氣為功若屬肺虛喘嗽非所宜也一麻黃辛甘而溫微澀入手太陰足太陽二經去營中寒邪善達肌表走經絡達表散風邪祛肺中寒鬱而開閉通利九竅為散寒邪之要藥也白腐症屬肺虛燥熱因誤投表散及寒涼之劑以致喘促醫者不悟復認為肺熱繼用麻黃肺氣即絕而斃矣可不慎歟一蟬蛻蛻一作退甘鹹而微涼得土木餘氣所化飧風吸露其氣清虛乃療屬實之風熱而開腠理能出聲音者輕可去實之義治風熱閉塞之音啞耳至於白腐之音啞更非蟬退所能療雖曰金空則鳴蓋因肺陰虧而遭誤治之故豈不知聲音出於腎之本乎一半夏味大辛微苦氣溫有毒其質滑潤其性燥濕入脾胃膽經生嚼戟喉制用下肺氣開胃健脾消痰止咳嗽除嘔吐反胃散風閉喉喑成聊攝云半夏辛而散行水而潤腎燥好古曰半夏能泄痰之標不能泄痰之本泄本者泄腎也咳無形而痰有形無形則潤有形則燥所以為流濕潤燥耳以半夏為肺藥則非矣喻嘉言曰半夏能和陰陽李時珍曰惟陰虛勞損非濕熱之邪而用之是重竭其津液醫之咎也豈藥之罪哉試思白腐之燥宜乎不宜一旋覆花即金沸草甘咸微溫入肺與大腸二經通血脈消結痰祛痞堅凡氣壅濕熱者宜之若氣虛及腎陰不足皆所忌用一苦參乃治惡瘡癰腫之品並不能療咽喉白腐等症一葛根辛甘氣平寒陽明經藥也輕揚發散主頭額疼痛解肌止渴宣癍發痘消毒解酒雖善達諸陽經而陽明為最以其氣輕故功在於解表發汗用此以治喉患似大非所宜一馬勃辛平輕虛清肺解熱散血治喉痹咽痛鼻衄失音等症此乃療屬實者之用故普濟消毒飲內用之殊非白腐咽痛音喑所宜外用敷臁瘡頗妙一山梔仁苦寒清心肺之火除熱鬱通五淋三焦火鬱因其味降亦瀉肝腎膀胱之火虛寒者則大非所宜一夏枯草苦微辛獨入厥陰善解肝氣消瘰癧散結氣止目珠痛開鬱療乳癰並非治喉之品一柴胡苦微辛氣平微寒入肝膽三焦心包絡四經其性涼故解寒熱往來肌表潮熱少陽頭痛肝經郁證溫瘧熱盛平肝熱口苦總之邪實者可用屬虛者非宜張會稽曰柴胡大能泄氣凡陰虛水虧孤陽勞熱者不可用恐損營氣也王海藏亦曰苟無實熱而用柴胡不死何待一前胡苦降微寒肺肝之藥散風祛熱消痰下氣二胡均為風藥但柴胡主升前胡主降質性迥異何能混合近見時醫二味每並用之詎非欲北其轍而南其轅殊屬可笑一川芎辛微甘氣溫其性善散乃血分藥也能通血海多服令人走散真氣致使暴亡若三陽火壅於上而頭痛者得升反甚今人不明升降之理而但知川芎善治頭痛謬亦甚矣即如喉科之開關散為川芎白芷二味取其提劫之功惟是近來諸喉患多兼虛燥又豈可妄施也耶一白芷辛溫氣厚手陽明引經本藥也其氣辛香達表逐風寒邪熱及肺經風熱治瘡瘍排膿止癢痛療頭痛通九竅大能發汗亦治蛇傷一青苔大苦寒得陰濕而生有小毒惟治下疳取而煎湯洗之甚效闢蜈蚣傷近有好奇者每用以煎水洗口舌生瘡遏毒戕胃貽誤非淺附案辛酉年秋日高族侄務農偶受風熱齒痛及咽疼素性慳吝視財重於命不肯服藥自飲石膏湯二大碗復取青苔煎湯含於口內齒患未見平而已昏沉不省人事勢將殆矣亟延余往診之兩脈濡弱無力乃投以養陰重劑漸及甘溫之品調治月餘始能痊健反耗去多金焉一慄蒲刺殼苦澀而涼陳者尤甚近來人之氣體漸弱所有口瘡舌瘡口糜諸症皆不宜用此煎洗不識者每為所誤以致口舌瘡愈蔓延至及於咽喉上顎更有轉為白纏喉而傷夭者已不止數覯矣余嘗治口舌各瘡其未用此刺殼洗者易療倘經洗過數次便難應手曾屢試驗不爽即此一味誤人最多蓋由於鄉曲農夫暨婦人等類多惜費竟喜此種簡便而不知此苦澀之為害無窮也以上諸品與白腐之屬燥兼肺腎不足以及口舌生白瘡諸症皆不相宜之味奈泥古不化及一知半解之醫遇症每率用之施施然誇為得法因此被誤而夭枉者甚多殊深惻憫故特表而出之宜用藥味列後一生地黃甘寒氣涼入心腎二經養陰除熱為喉科要藥但性兼破血宜少用一熟地黃甘溫微苦功用尤宏大補氣血滋培腎水填骨髓益真陰專補腎中元氣凡諸真陰虧虛有為發熱為頭痛為喉痹為氣喘為痰嗽或虛火載血於口鼻或陽浮而狂躁或陰虛而火升者皆非熟地不可得甘草能開胃進食誠為藥中之上品並治喉患之神丹群芳譜又載其能治肺損牙宣齦露跌撲損傷嗟乎熟地之功其不申於時用者久矣尤見畏忌於今時諸醫既不善用猶執此而誹謗之殊深可恨耳均按鄭君此數言矯枉過正不免偏護熟地太甚今人何嘗不重用之其傎者每逢人病將愈不問其體質何如動以熟地加入方中為調理之需率損多而益少余所目擊僨事者比比如光緒辛卯壬辰之間此風最熾猶記一族嫂於春初產後去血過多勢甚萎靡一老醫不審其雖虛而兼有外感遽投大劑養血用熟地至五六錢服下則飽悶不欲食二劑則痰壅氣閉而殞又旺山石姓一男子年未五十務農操勞初夏偶患濕瘧邪未清以藥截之致倦怠減食肩發燒熱有一醫謂為服田辛苦虛熱可虞疏一金水六君方與之囑以多服兼可延年甫進二劑即見腹膨氣逆食少便溏急趨詢醫雲系初服病行為吉徵也仍勸多服乃再三四劑逐漸加劇卒成水臌未半月腹腳流水而死迄光緒末年有一族祖叔母高年偶患外感病匪沉重鄰村一老醫診之謂宜先扶正而後驅邪投以八珍合逍遙方法重用熟地服下忽變昏迷氣閉熱反內陷急延柯君挽救已無及矣嗟嗟此三人者皆以熟地戕命蓋藥各有所主治不能拘定成見謂此為良謂彼為劣總要審症周詳然後用藥必當烏喙亦能愈疾參耆何不殺人況熟地滋膩之質其能一無偏弊乎不過白腐一症實恃為濟生神丹鄭君之言固不謬而不可概乎別病也一玄參苦甘微咸氣寒能滋陰清火不獨入腎亦走肺臟故能退無根浮游之火散周身痰結熱癰逐頭項咽喉痹痛解斑疹理心內驚煩主用繁多一貝母苦寒氣平凡用必須川產者良其味甘微苦氣平不寒除肺熱降胸中熱結祛肺癰肺痿痰膿喘嗽清咽喉潤肺燥至於土貝母浙貝母大苦性寒氣味俱厚惟不宜於白腐之症一知母苦寒氣味俱厚為腎經本藥兼能清肺止渴去喉中腥臭退陰火肅清龍雷去膀胱肝腎濕熱一麥門冬甘而微寒肺經藥也其味甘多苦少故上行心肺補上焦之津液清肺中之伏火益精滋陰澤肌潤結瀉熱火而益元氣滋燥金而清水源肺乾咳嗽消痰補怯誠為要藥治腸燥便結亦妙蓋以肺與大腸相為表裡之故一天門冬甘苦而寒肺腎之藥清金降火益水之源故三才丹中用之一葳蕤即玉竹甘平入脾柔潤入腎故能補中益氣逐熱除蒸治風淫濕毒止頭痛腰痛目疼皆爛大有殊功一丹皮辛苦微涼氣味輕俱入足少陰及手厥陰清肝腎之虛熱但其微涼而辛治白腐亦頗宜一火麻仁即黃麻甘平性滑潤心肺滋五臟利大腸風熱結燥凡當潤下者用此最妙胡麻仁如栗色名鱉蝨胡麻主治亦同一女貞子苦涼而平養陰氣平陰火清肝火明目療陰虛喉痛於白腐亦宜一白芍酸而微苦性頗寒氣薄於味斂降多而升散少為肺脾行經藥入肝脾血分瀉肝火固腠理退虛熱消癰腫斂瘡口凡喉患開首緩用恐其酸斂也一沙參微甘微苦氣味俱輕性微寒補陰清肺排膿消腫除邪熱涼肝補五臟之陰南沙參兼清散勿用一茯苓甘淡而平補中開胃利水化痰淡滲上行生津液開腠理滋水之源而下降用人乳拌勻蒸曬炒過更佳一叭噠杏仁味甘而美味厚於氣無毒入肺胃大腸寧嗽潤肺亦潤腸化痰解喉痹一黑豆即馬料豆甘寒色黑屬水似腎腎之谷也補心腎散熱祛風解毒消腫一種野料豆更佳畏五參龍膽豬肉得杏仁牡蠣良一桑葉甘寒手足陽明之藥涼血清熱經霜者療嗽若音啞勿用一當歸甘辛而溫入心肝脾三經血分之藥凡喉患屬血虛者佐白芍治之效但不大宜於白腐因其辛溫而散也一百合甘淡氣平功緩益氣潤肺除嗽解喉痹乳癰潤大小便又一種味苦者不宜用一山藥原名薯蕷甘平而淡微澀補脾肺益腎澀精養心神除煩熱治諸虛百損須選淮山藥之肥白者乃佳其建山藥味苦氣烈不合於用尤不宜於白腐一甘草氣平味甘之品合土之德故獨入脾胃稼穡作甘土之正味蓋土居中而能兼運乎五行可升可降可內可外有和有緩有生有克有承有制有補有瀉善於解諸毒祛熱邪堅筋骨建脾胃長肌肉隨氣藥入氣隨血藥入血無往而不可故稱為國老凡生用則涼炙用則溫尤能助熟地療陰虛之危一金釵斛甘淡而力薄性輕清和緩有從容分解之妙能養陰退火除煩清肺逐邪熱平脾胃之火去嘈雜善飢一沙苑蒺藜甘溫入肝腎二經益精補腎止腿痛遺泄凡喉患後用佐調理甚良一黑芝麻即巨勝子甘平補中益氣養肺潤腸逐風濕填腦髓久服延年療白纏喉最妙以上諸品均純陰至靜之藥乃喉患之所必需用得其宜何異神丹九轉第今時之人腎陰不足者居多是以喉患屬虛者比比如此故治法須兼顧養陰若拘於俗見徒從事表散寒涼而不誤者鮮矣附見銅綠即銅青酸平微毒治風爛淚眼惡瘡疳瘡婦人血氣心痛吐風痰合金瘡止血殺蟲用醋製刮用自然銅辛平主折傷續筋骨散瘀止痛火煅醋焠七次研細取用均按此二味並非治喉之品即吹藥內亦不宜入不知何故羼入編末或系鈔書者誤摘於此耶抑不知前所列忌用藥品下注明六十八味數之不足當經錯落此二味屬於前而補於後耶然於書意旨無妨姑仍舊貫錄存之自制醫說醫道之不明也久矣語云醫道通乎仙道以之壽世功莫大焉奈何今時之醫直入於鬼道非道之有鬼道也以人之有詭道耳既詭於道即不軌於道不軌於道則道不行道不行計思所以行之不得不詭於其道入於詭則出於軌是軌之紊於詭也因而為詭道軌夫天有好生之德天道也醫具仁人之術人道也求其道於天人加意於靈素軒岐之蘊而軌道彰焉安有所謂鬼道者哉人惟日與詭習即日與軌遠與詭習則鬼道益工與軌遠則詭道愈甚失其光明正大之軌趨為逆情干譽之詭而甘入於鬼道焉噫以通乎仙道之軌易為詭道之鬼此道之所以不明也可慨也夫嘉慶八年歲在癸亥孟秋月上瀚樞扶氏識於十琴軒民國十二年歲紀亦在癸亥暮春多雨索居岑寂愁悶叢生爰檢閱藏帙得此道光元年歲次辛巳吳季儒手鈔鄭氏喉科秘本因重錄之更訝其歲紀相值餘生年亦為辛巳也是寶冊宜有異徵立夏夜鈔竣叔和記此歙西鄭氏世傳喉牙科方鈔本我家得自蓮川周丈邦彥同治紀元兵戈紛擾米鬥錢二千文時擁厚資有持此冊求售者云舉家雖已二日未得食此寶則非百金不換也丈慨然以米二石易之珍逾拱璧莫肯示人後營業失敗境日窘促乃攜以見先君子曰身老家落寶不能藏然不甘貶價求沽感君知己聊以為贈雖未言價而索價之奢躍然言外先君子爰以番餅五十元酬之時我家無習醫者庋置篋中幾飽蟫蠹光緒甲午五兄石農偕婦寄居其外舅程金門先生家一日馳書來里言其婦患喉症甚重其外舅亦祖傳內外科甚精治之轉劇遍延諸名宿暨歙東外科程炳文先生診視皆愈治愈甚刻已水漿不入僵臥經朝已料理衣櫬決無生望矣先君子忽然憶及此書命均檢出一翻視曰得無所患為白腐乎立刻飭族兄觀水星夜齎往即照書中養陰清燥原方重劑與服勉為灌下未周時即大霍然次早族兄回已自起治事並進泡飯兩碗矣嗣云傳染十數人或有輕重而照此治之輒愈其前因此殞命者蓋三人焉越二年兄返里行道遂以此症擅名救活重險之候計十餘云柯君澤舟與均稱莫逆言業醫半生未大負疚只一族婦患白喉比時未得此書治法率以普通疏風清熱之品投之卒以不救深覺歉然余因錄副本贈之伊因謂余此舉為大功德醫者本以利濟為天職曩昔中國陋習相仍得有妙技良方率取秘密主義神異其說勒取多資均私嘗竊鄙之自恨僻處山縣環境荊棘口鈍詞訥不克出與當世賢智周旋憂病交迫未老先衰真是枉生人世也年來親友勸迫懸壺於裡雖切濟人之誠而乏眩人之術直道難行自責亦自哀焉茲見杭州三三醫社廣告徵求秘籍仁義存懷痌瘝斯民天下有心人俱當傾倒矣均感佩之餘悵然未由接近只得心神馳慕而已適於月前錄此副本成於倉卒兼愁悶中謬錯未及糾正覥以寄呈願大加刪潤而推行之俾患此者無夭扎之虞貴社前途幸福無量癸亥陰曆六月一日草草跋此以志原委而留爪泥叔和謹識按陳修園醫書四十八種中有言白喉者寥寥數頁云當養陰與此頗合著者託言乩仙語簡而不精且中雜用疏散恐遵之難收實效不及此之精當詳明百利而無一弊也
